<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- transparent background: glyph blends with the page -->
  <circle cx="32" cy="32" r="19" fill="none" stroke="#5b5f86" stroke-width="2"/>
  <!-- aperture blades (6-fold iris) -->
  <g stroke="#9aa3e6" stroke-width="2.6" stroke-linecap="round">
    <line x1="32" y1="14" x2="38.4" y2="25" transform="rotate(0 32 32)"/>
    <line x1="32" y1="14" x2="38.4" y2="25" transform="rotate(60 32 32)"/>
    <line x1="32" y1="14" x2="38.4" y2="25" transform="rotate(120 32 32)"/>
    <line x1="32" y1="14" x2="38.4" y2="25" transform="rotate(180 32 32)"/>
    <line x1="32" y1="14" x2="38.4" y2="25" transform="rotate(240 32 32)"/>
    <line x1="32" y1="14" x2="38.4" y2="25" transform="rotate(300 32 32)"/>
  </g>
  <!-- pupil -->
  <circle cx="32" cy="32" r="3.6" fill="#9aa3e6"/>
</svg>
