  L.push("Asset reviewed: " + d.defanged + " (" + d.kind + ")");
  L.push("Risk rating:    " + riskRating(d) + " — " + d.verdict + " (" + d.score + "/100)");
  L.push("");
  L.push("Bottom line:");
  L.push(bottom);
  L.push("");
  L.push("Why:");
  stakeholderPoints(d).slice(0, 3).forEach(function (p) { L.push("• " + p); });
  L.push("");
  L.push("Recommended action: " + decision);
  L.push("");
  L.push("Prepared by SC4N automated triage · " + new Date().toISOString());
  return L.join("\n");
}

// End User — plain guidance for non-technical staff
function fmtEndUser(d) {
  const danger = d.verdict === "Likely Malicious" || d.verdict === "Suspicious";
  const result = ({
    "Likely Malicious": "⚠ This looks DANGEROUS — do not interact with it.",
    "Suspicious": "⚠ This looks SUSPICIOUS — be very careful.",
    "Low–Moderate": "This is probably okay, but stay alert.",
    "Likely Legitimate": "✓ This looks SAFE."
  })[d.verdict] || (d.unresolved ? "This name doesn't exist online — it has no records at all." : "Unable to determine — check with IT Security.");
  if (d.unresolved) {
    return ["IS THIS SAFE?", "", "We checked: " + d.defanged, "", "Result: " + result, "",
      "In plain terms: This web/email name isn't set up on the internet — there's nothing there. It can't host a real website or send or receive email.",
      "", "Recommended action — what you should do:",
      "• If you typed it yourself, double-check the spelling.",
      "• If an email or message said it came from this name, be suspicious — a name that doesn't exist can't really send mail, so the sender was likely faked.",
      "• When in doubt, forward it to IT Security rather than replying or clicking."].join("\n");
  }
  const plain = (d.kind === "hash" ? {
    "Likely Malicious": "This file is identified as malware.",
    "Suspicious": "This file has some suspicious characteristics.",
    "Low–Moderate": "Nothing major stood out, but this file isn't clearly trusted.",
    "Likely Legitimate": "This file is not flagged as malicious."
  } : d.kind === "cidr" ? {
    "Likely Malicious": "This block of internet addresses shows widespread malicious activity.",
    "Suspicious": "This block of addresses contains some suspicious activity.",
    "Low–Moderate": "Nothing major stood out across this block of addresses.",
    "Likely Legitimate": "This block of addresses looks normal."
  } : d.kind === "ip" ? {
    "Likely Malicious": "This internet address is associated with malicious activity.",
    "Suspicious": "Some details about this address look off.",
    "Low–Moderate": "Nothing major stood out, but it's not clearly trusted either.",
    "Likely Legitimate": "It looks like a normal internet address."
  } : {
    "Likely Malicious": "It has the hallmarks of a scam or fake website.",
    "Suspicious": "Some details about it look off.",
    "Low–Moderate": "Nothing major stood out, but it's not clearly trusted either.",
    "Likely Legitimate": "It looks like a normal, established website."
  })[d.verdict] || "";

  const L = [];
  L.push("IS THIS SAFE?");
  L.push("");
  L.push("We checked: " + d.defanged);
  L.push("");
  L.push("Result: " + result);
  if (plain) L.push("In plain terms: " + plain);
  L.push("");
  L.push("Recommended action — what you should do:");
  if (danger) {
    L.push("• Do NOT click any links or open attachments.");
    L.push("• Do NOT reply or enter any passwords or personal information.");
    L.push("• Report the message to IT Security, then delete it.");
  } else {
    L.push("• You can proceed as normal.");
    L.push("• If anything still feels off, contact IT Security before acting.");
  }
  return L.join("\n");
}

function copySummary() {
  const t = $("ticket");
  if (t) navigator.clipboard.writeText(t.textContent).then(() => {
    const b = document.querySelector('.copybtn');
    if (b) { const o = b.textContent; b.textContent = "Copied ✓"; setTimeout(() => b.textContent = o, 1400); }
  });
}

/* ---------- header clocks: US zones + UTC ---------- */
const CLOCK_ZONES = [
  ["z-pt", "America/Los_Angeles", "PT"],
  ["z-mt", "America/Denver", "MT"],
  ["z-ct", "America/Chicago", "CT"],
  ["z-et", "America/New_York", "ET"],
  ["z-utc", "UTC", "UTC"],
];
function zoneTime(tz) {
  try {
    return new Intl.DateTimeFormat("en-GB", {
      timeZone: tz, hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false,
    }).format(new Date());
  } catch (e) { return "--:--:--"; }
}
// full timestamp for clipboard (ISO for UTC)
function zoneStamp(tz, label) {
  if (tz === "UTC") return new Date().toISOString();
  try {
    const s = new Intl.DateTimeFormat("en-CA", {
      timeZone: tz, year: "numeric", month: "2-digit", day: "2-digit",
      hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false,
    }).format(new Date());
    return s.replace(",", "") + " " + label;
  } catch (e) { return label + " " + zoneTime(tz); }
}
function tickClock() {
  CLOCK_ZONES.forEach(function (z) {
    const el = $(z[0]);
    if (el && !el.dataset.flash) el.textContent = zoneTime(z[1]) + (z[0] === "z-utc" ? "Z" : "");
  });
}
(function initClock() {
  CLOCK_ZONES.forEach(function (z) {
    const el = $(z[0]);
    if (!el) return;
    const ck = el.closest(".ck");
    ck.title = "Click to copy " + z[2] + " timestamp";
    ck.onclick = function () {
      navigator.clipboard.writeText(zoneStamp(z[1], z[2])).then(function () {
        const prev = el.textContent;
        el.dataset.flash = "1";
        el.textContent = "copied";
        ck.classList.add("flash");
        setTimeout(function () {
          delete el.dataset.flash;
          ck.classList.remove("flash");
          el.textContent = prev;
        }, 1000);
      });
    };
  });
  tickClock();
  setInterval(tickClock, 1000);
})();

/* ---------- recent searches (browser-local) ---------- */
const RECENT_KEY = "sc4n_recent";
function getRecent() {
  try { return JSON.parse(localStorage.getItem(RECENT_KEY)) || []; } catch (e) { return []; }
}
function saveRecent(d) {
  if (!d || !d.ok) return;
  let list = getRecent().filter(r => r.t !== d.input);
  list.unshift({ t: d.input, label: d.defanged || d.input, k: d.kind, v: d.verdict, s: d.score });
  list = list.slice(0, 5);
  try { localStorage.setItem(RECENT_KEY, JSON.stringify(list)); } catch (e) {}
  renderRecent();
}
function renderRecent() {
  const el = $("recent");
  if (!el) return;
  const list = getRecent().slice(0, 5);
  if (!list.length) { el.innerHTML = ""; return; }
  const chips = list.map(function (r) {
    const col = ({ "low": "#57b083", "lowmod": "#d4a24a", "suspicious": "#d4a24a", "malicious": "#e96a6a" })[verdictClass(r.v)] || "#8d8d97";
    return '<span class="rchip" title="' + esc(r.v) + ' · ' + r.s + '/100" onclick="runRecent(' + JSON.stringify(r.t).replace(/"/g, "&quot;") + ')">' +
      '<span class="rdot" style="background:' + col + '"></span>' +
      '<span class="rt">' + esc((r.label || r.t).slice(0, 24)) + '</span></span>';
  }).join("");
  el.innerHTML = '<span class="rlabel">Recent</span>' +
    '<span class="rchips">' + chips + '</span>' +
    '<span class="rclear" onclick="clearRecent()">clear</span>';
}
function runRecent(t) { $("target").value = t; toggleClear(); analyze(); }
function clearRecent() { try { localStorage.removeItem(RECENT_KEY); } catch (e) {} renderRecent(); }
renderRecent();
</script>
