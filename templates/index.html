<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SC4N</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg?v=2">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
  <h1 class="brand"><span class="wm">SC<span class="wm-x">4</span>N</span></h1>
  <div class="hdr-rail">
    <div class="clock" id="clock">
      <div class="ck"><span class="z">PT</span><span class="t" id="z-pt">--:--:--</span></div>
      <div class="ck"><span class="z">MT</span><span class="t" id="z-mt">--:--:--</span></div>
      <div class="ck"><span class="z">CT</span><span class="t" id="z-ct">--:--:--</span></div>
      <div class="ck"><span class="z">ET</span><span class="t" id="z-et">--:--:--</span></div>
      <div class="ck utc"><span class="z">UTC</span><span class="t" id="z-utc">--:--:--</span></div>
    </div>
  </div>
</header>

<div class="wrap">
  <form class="search" onsubmit="event.preventDefault(); analyze();">
    <input id="target" placeholder="domain, IP, CIDR, URL, email, or file hash — defanged is fine" autocomplete="off" autofocus oninput="toggleClear()">
    <button id="clearBtn" type="button" class="clear" title="Clear" aria-label="Clear search" onclick="clearTarget()" hidden>&times;</button>
    <button id="analyzeBtn" type="button" onclick="toggleSearch()">Analyze</button>
  </form>
  <p class="hint">
    Accepts domains, IPs, URLs, emails, file hashes, and CIDR ranges — defanged IOCs
    like <code>hxxp</code>, <code>[.]</code>, and <code>[at]</code> are auto-refanged.
  </p>

  <div id="recent" class="recent"></div>
  <div id="status" class="status"></div>
  <div id="output"></div>
</div>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s == null ? "" : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
// only allow http(s) URLs from external data into href/src; block javascript:/data: schemes
const safeUrl = u => /^https?:\/\//i.test(String(u || "")) ? u : "#";

let loaderTimer = null;
const LOADER_STEPS = [
  "Resolving DNS records",
  "Querying VirusTotal",
  "Checking IP reputation",
  "Fetching WHOIS / RDAP",
  "Probing SPF · DKIM · DMARC",
  "Scanning urlscan + certificates",
  "Scoring risk signals",
];
function startLoader(target) {
  let pct = 0;
  $("status").innerHTML =
    '<div class="loader fade-in"><div class="loader-bar"><i id="loaderFill"></i></div>' +
    '<div class="loader-step">' +
    '<span class="lstep" id="loaderStep"><b>' + esc(target) + '</b> — ' + LOADER_STEPS[0] + '…</span>' +
    '<span class="lpct" id="loaderPct">0%</span></div></div>';
  loaderTimer = setInterval(function () {
    // ease toward ~92%; snaps to 100% on finish
    pct += Math.max(0.6, (92 - pct) * 0.09);
    if (pct > 92) pct = 92;
    const idx = Math.min(LOADER_STEPS.length - 1, Math.floor(pct / (92 / LOADER_STEPS.length)));
    const fill = $("loaderFill"), s = $("loaderStep"), p = $("loaderPct");
    if (fill) fill.style.width = pct + "%";
    if (s) s.innerHTML = '<b>' + esc(target) + '</b> — ' + LOADER_STEPS[idx] + '…';
    if (p) p.textContent = Math.round(pct) + "%";
  }, 500);
}
function finishLoader() {
  const fill = $("loaderFill"), p = $("loaderPct");
  if (fill) fill.style.width = "100%";
  if (p) p.textContent = "100%";
}
function stopLoader() { if (loaderTimer) { clearInterval(loaderTimer); loaderTimer = null; } }

let currentController = null;
let isRunning = false;

function setRunning(on) {
  isRunning = on;
  const btn = $("analyzeBtn");
  btn.textContent = on ? "Stop" : "Analyze";
  btn.classList.toggle("stop", on);
}

// stop if running, else start
function toggleClear() { const b = $("clearBtn"); if (b) b.hidden = !$("target").value; }
function clearTarget() { const t = $("target"); t.value = ""; toggleClear(); t.focus(); }

function toggleSearch() { if (isRunning) cancelAnalyze(); else analyze(); }

function cancelAnalyze() {
  if (currentController) { currentController.abort(); currentController = null; }
  stopLoader();
  setRunning(false);
  $("status").innerHTML = "✕ Search cancelled";
}

async function analyze() {
  const target = $("target").value.trim();
  if (!target) return;
  if (currentController) currentController.abort();   // supersede in-flight search
  const controller = new AbortController();
  currentController = controller;
  let timedOut = false;
  const timeoutId = setTimeout(() => { timedOut = true; controller.abort(); }, 55000);
  setRunning(true);
  startLoader(target);
  $("output").innerHTML = "";

  const form = new FormData();
  form.append("target", target);

  const fail = (msg) => {
    stopLoader(); setRunning(false); currentController = null;
    $("output").innerHTML = '<div class="err">✗ ' + esc(msg) + '</div>';
    $("status").innerHTML = "";
  };

  try {
    const res = await fetch("/analyze", { method: "POST", body: form, signal: controller.signal });
    clearTimeout(timeoutId);
    if (controller.signal.aborted) return;            // cancelled or superseded
    if (!res.ok) {
      let msg;
      if (res.status === 429) msg = "Too many searches in a short time. Wait a few seconds and try again.";
      else if (res.status === 400) {
        let body = null; try { body = await res.json(); } catch (_) {}
        msg = (body && body.error) ? body.error : "That input wasn't understood — check the format and try again.";
      } else if (res.status === 502 || res.status === 503 || res.status === 504) {
        msg = "The analysis took too long and the server timed out before finishing. Domains that don't resolve still get every source checked, which can be slow — please try again.";
      } else if (res.status >= 500) {
        msg = "The analysis engine hit an error on this input (HTTP " + res.status + "). Please try again, or try a different format.";
      } else {
        msg = "The request failed (HTTP " + res.status + ").";
      }
      fail(msg);
      return;
    }
    let data;
    try {
      data = await res.json();
    } catch (_) {
      fail("The server returned an unexpected response — it may have timed out mid-analysis. Please try again.");
      return;
    }
    if (controller.signal.aborted) return;
    if (!data.ok) { fail(data.error || "Analysis failed."); return; }
    finishLoader();
    await new Promise(r => setTimeout(r, 220));
    if (controller.signal.aborted) return;
    stopLoader();
    render(data);
    $("status").innerHTML = '✓ Triage complete · ' + esc(data.kind) + ' · ' + esc(data.domain);
    setRunning(false); currentController = null;
  } catch (e) {
    clearTimeout(timeoutId);
    if (e.name === "AbortError") {
      // our timeout vs a user cancel
      if (timedOut) fail("The analysis timed out after 55 seconds — some intel sources were slow to respond (common for domains with no DNS records). Please try again.");
      return;
    }
    fail("Couldn't reach the analysis server. Check your internet connection and try again.");
  }
}

let current = null;
function render(d) {
  current = d;
  $("output").innerHTML = verdictBanner(d) + cards(d);
  lockTicketHeight();
  saveRecent(d);
}

// pin to tallest format so tab switching doesn't reflow
function lockTicketHeight() {
  const t = $("ticket");
  if (!t) return;
  t.style.minHeight = "";
  let max = 0;
  ["security", "executive", "enduser"].forEach(function (f) {
    t.innerHTML = ticketBody(ticketFmts[f] || "");
    if (t.offsetHeight > max) max = t.offsetHeight;
  });
  t.innerHTML = ticketBody(ticketFmts.security);   // restore default report
  t.style.minHeight = max + "px";
}

function verdictClass(v) {
  return ({"Likely Legitimate":"low","Low–Moderate":"lowmod","Suspicious":"suspicious","Likely Malicious":"malicious","No DNS Record":"neutral"})[v] || "low";
}
function ringColor(score) {
  if (score >= 80) return "#ff2d2d";   // severe red
  if (score >= 60) return "#f85149";   // red
  if (score >= 30) return "#f0883e";   // orange
  if (score >= 12) return "#e3b341";   // amber
  return "#3fb950";                     // green
}

// tooltip text per risk-flag category
const FLAG_TIPS = {
  "Shared host": "A user-created site on a free/shared hosting platform (Render, Vercel, Netlify, Fly.io…). Anyone can spin one up in minutes and they're heavily abused for phishing — the platform's age and reputation say nothing about this specific site.",
  "Compromised": "This exact address appears in infostealer-malware logs — its saved credentials were stolen, so the account may be hijacked and used to send malicious mail.",
  "Spoofable": "Weak email authentication (SPF/DKIM/DMARC) lets attackers forge mail from this domain — the basis of Business Email Compromise (BEC).",
  "New domain": "Recently registered domains are disproportionately used for scams and phishing.",
  "Impersonation": "Mimics a well-known brand or domain to deceive victims.",
  "Redirect": "Silently sends visitors to a different domain than the one requested.",
  "Known bad": "Listed on a threat-intelligence feed of confirmed-malicious indicators.",
  "Disposable": "A temporary / throwaway email domain, often used to avoid attribution.",
  "Fraud": "Flagged for fraud or abuse by an email / IP reputation service."
};
function verdictBanner(d) {
  const cls = verdictClass(d.verdict);
  const unresolved = !!d.unresolved;               // no DNS → no risk score
  const ring = unresolved ? "#8b8b96" : ringColor(d.score);
  const ringNum = unresolved ? "—" : d.score;
  const pct = unresolved ? 0 : d.score;
  const sub = unresolved ? "does not resolve — no DNS records" : ("risk " + d.score + "/100");
  const tags = (d.flags || []).map(f => {
    const tip = FLAG_TIPS[f.cat] || "";
    return '<span class="tag"' + (tip ? ' title="' + esc(tip) + '"' : '') +
      '><b>' + esc(f.cat) + '</b>' + (f.detail ? ' · ' + esc(f.detail) : '') + '</span>';
  }).join("");
  return '' +
    '<div class="verdict ' + cls + ' fade-in">' +
      '<div class="score-ring" style="--pct:' + pct + ';--ring:' + ring + '"><i>' + ringNum + '</i></div>' +
      '<div class="v-main">' +
        '<div class="label">Verdict</div>' +
        '<div class="val">' + esc(d.verdict) + '</div>' +
        '<div class="ioc">' + esc(d.defanged) + '  ·  ' + esc(sub) + '</div>' +
        (tags ? '<div class="tags">' + tags + '</div>' : '') +
      '</div>' +
    '</div>' +
    '<div class="brief fade-in"><h3>Summary</h3><p>' + esc(buildBrief(d)) + '</p></div>' +
    (d.reasons && d.reasons.length ?
      '<div class="signals fade-in"><h3>Signals</h3><ul>' +
      d.reasons.map(r => "<li>" + esc(r) + "</li>").join("") + '</ul></div>' : '');
}

// IP summary: what it is, why flagged, what to do
function ipBrief(d) {
  const i = d.info || {}, ab = d.abuse || {}, vt = d.vt || {}, otx = d.otx || {},
        gn = d.greynoise || {}, sh = d.shodan || {}, rip = d.rdap_ip || {}, iq = d.ipqs || {};
  const stats = vt.last_analysis_stats || {};
  const owner = i.isp || i.org || vt.as_owner || ab.isp || iq.isp || rip.name || null;
  const usage = (ab.usageType || "").toLowerCase();
  const hosting = i.hosting || /data ?cent|hosting|server|transit|colo/.test(usage) || /data ?center/i.test(iq.connection_type || "");
  const anon = i.proxy || ab.isTor || iq.proxy || iq.vpn || iq.tor || /proxy|vpn|tor/.test(usage);

  // what it is
  let s1 = "This is " + (hosting ? "a data-center / hosting IP" : "an IP") + (owner ? " operated by " + owner : "");
  if (ab.isTor || iq.active_tor) s1 += ", running as a Tor exit node";
  else if (iq.active_vpn) s1 += ", operating as an active VPN endpoint";
  else if (anon) s1 += ", flagged as proxy / VPN / Tor infrastructure";
  s1 += (i.city && (i.countryCode || i.country)) ? " (" + i.city + ", " + (i.countryCode || i.country) + ")." : ".";

  // why it's flagged — strongest first, capped at 3
  const why = [];
  if (d.threatfox && d.threatfox.found) why.push("it matches a known malware / C2 indicator in ThreatFox");
  if (d.urlhaus && d.urlhaus.found) why.push("it has hosted malware (URLhaus, " + ((d.urlhaus.url_count || 0)) + " URLs)");
  if (iq.recent_abuse) why.push("IPQS flags recent fraudulent / abusive activity (fraud score " + (iq.fraud_score || 0) + "/100)");
  const sc = ab.abuseConfidenceScore || 0;
  if (sc >= 25) why.push("AbuseIPDB rates it " + sc + "/100" + (ab.totalReports ? " across " + ab.totalReports + " reports" : "") +
    (ab.top_categories && ab.top_categories.length ? " (" + ab.top_categories.slice(0, 2).join(", ") + ")" : ""));
  const mal = stats.malicious || 0;
  if (mal > 0) {
    const tot = (stats.malicious || 0) + (stats.suspicious || 0) + (stats.harmless || 0) + (stats.undetected || 0);
    why.push(mal + (tot ? " of " + tot : "") + " security vendors flag it malicious");
  }
  if (iq.bot_status) why.push("IPQS sees automated bot activity from it");
  if (gn.observed && gn.classification === "malicious") why.push("GreyNoise has caught it scanning the internet");
  if ((otx.pulse_count || 0) > 0) {
    const tg = (otx.tags || []).filter(t => /honeypot|honeynet|malware|c2|botnet|scan|brute|phish|exploit|rat|trojan|spam/i.test(t)).slice(0, 2);
    const named = (otx.malware_families || []).concat(otx.adversaries || []).slice(0, 2);
    why.push(otx.pulse_count + " AlienVault OTX threat report" + (otx.pulse_count === 1 ? "" : "s") +
      (named.length ? " (" + named.join(", ") + ")" : (tg.length ? " (tagged " + tg.join(", ") + ")" : "")));
  }
  if (sh.vulns && sh.vulns.length) why.push("it exposes services with known CVEs (" + sh.vulns.slice(0, 2).join(", ") + ")");
  const oddPorts = (sh.ports || []).filter(p => [80, 443, 22, 25, 53, 110, 143, 993, 995, 587, 465].indexOf(p) < 0);
  if (oddPorts.length && why.length < 3) why.push("it exposes unusual open ports (" + oddPorts.slice(0, 4).join(", ") + ")");

  let s2 = "";
  if (why.length) {
    const w = why.slice(0, 3);
    w[0] = w[0].charAt(0).toUpperCase() + w[0].slice(1);
    s2 = w.join("; ") + ".";
  }

  // what to do, keyed to verdict
  const posture = ({
    "Likely Malicious": "Treat it as hostile — consider blocking and hunting for connections to it.",
    "Suspicious": "Treat traffic to or from it as untrusted and corroborate against your own logs before acting.",
    "Low–Moderate": "Low confidence of malice — note it and watch for repeat activity.",
    "Likely Legitimate": "No significant risk indicators — appears to be normal infrastructure."
  })[d.verdict] || "";

  return [s1, s2, posture].filter(Boolean).join(" ");
}

function buildBrief(d) {
  if (d.kind === "ip") return ipBrief(d);
  if (d.unresolved) {
    const what = (d.kind === "email" ? "email domain" : "domain") + " (" + d.defanged + ")";
    return "This " + what + " has no DNS records — no A, MX, or NS entries and no registration — so it does not resolve and appears to be unregistered or inactive. " +
      (d.kind === "email"
        ? "Because the domain does not exist, this address cannot receive mail and is not a valid or deliverable sender."
        : "It cannot currently host a website or receive email. This is not evidence of malice — the name simply is not live.");
  }
  const plain = ({
    "Likely Malicious": "likely malicious", "Suspicious": "suspicious",
    "Low–Moderate": "low-to-moderate risk", "Likely Legitimate": "likely legitimate"
  })[d.verdict] || d.verdict.toLowerCase();
  const kind = d.kind === "email" ? "email domain" : (d.kind === "url" ? "URL" : (d.kind === "ip" ? "IP address" : (d.kind === "cidr" ? "network block" : (d.kind === "hash" ? "file" : "domain"))));
  let s = "This " + kind + " (" + d.defanged + ") is assessed as " + plain +
    " with a risk score of " + d.score + "/100. ";
  const pts = stakeholderPoints(d);
  s += pts.slice(0, 2).join(" ");
  return s;
}

function pill(label, on) {
  return '<span class="pill ' + (on ? 'on' : 'off') + '">' + esc(label) + (on ? ' ✓' : ' ✗') + '</span>';
}

// is this API key configured server-side?
function keyOn(k) { return !!(current && current.keys && current.keys[k]); }
function muted(msg) { return '<pre class="muted">' + esc(msg) + '</pre>'; }

function cards(d) {
  if (d.kind === "ip") return ipCards(d);
  if (d.kind === "cidr") return cidrCards(d);
  if (d.kind === "hash") return hashCards(d);
  const out = [];

  // non-existent domain — the cards below are empty, so explain up front
  if (d.unresolved)
    out.push(card("About this domain", '<pre class="muted" style="white-space:pre-wrap;margin:0">' + esc(d.defanged + " has no DNS records — no A, MX, or NS entries and no registration. It does not resolve and appears to be unregistered or inactive, so the details below are mostly empty. This is not evidence of malice — the name simply is not live.") + '</pre>'));

  // hosting-platform context: feed hits mean malware hosted here, not that the platform is bad
  if (!d.unresolved && d.is_platform && d.platform_note)
    out.push(card("About this domain", '<pre class="muted" style="white-space:pre-wrap;margin:0">' + esc(d.platform_note) + '</pre>'));

  // tenant on a shared host: the platform's age/registrar below is NOT this site's
  if (!d.unresolved && d.is_tenant && d.tenant_note)
    out.push(card("About this site", '<pre class="warn-note" style="white-space:pre-wrap;margin:0">' + esc(d.tenant_note) + '</pre>'));

  // consumer-provider context: domain intel is about the provider, not the mailbox
  const provider = !!d.is_provider;
  if (!d.unresolved && provider && d.provider_note)
    out.push(card("About this address", '<pre class="muted" style="white-space:pre-wrap;margin:0">' + esc(d.provider_note) + '</pre>'));

  // email auth posture (BEC card)
  const dmarc = d.dmarc_parsed, spf = d.spf_parsed;
  // for a big provider / dead domain, missing SPF/DMARC isn't a sender spoofing risk
  const noAuthRisk = provider || d.unresolved || d.is_tenant;
  const dmarcBad = !noAuthRisk && (!dmarc || (dmarc.policy || "none").toLowerCase() === "none");
  const spfBad = !noAuthRisk;
  out.push(card("Email Auth Posture (BEC)",
    kvrow("DMARC", dmarc ? "p=" + dmarc.policy + (dmarc.pct && dmarc.pct !== "100" ? " pct=" + dmarc.pct : "") : "MISSING", dmarcBad ? "bad" : "good", "DMARC tells receivers what to do with spoofed mail. p=reject (block) is strongest; p=none or MISSING means the domain is easy to spoof (a BEC risk).") +
    kvrow("SPF", spf ? spf.policy : "MISSING", spf ? (spf.policy.includes("dangerous") ? "bad" : "good") : (spfBad ? "bad" : "good"), "SPF lists which servers may send mail for this domain. MISSING makes spoofing easier.") +
    kvrow("DKIM", (d.dkim && d.dkim.length) ? d.dkim.join(", ") : "none found (selectors probed)", (d.dkim && d.dkim.length) ? "good" : "warn", "DKIM cryptographically signs outgoing mail. We probe common selectors; 'none found' isn't conclusive but is a weak-auth sign.") +
    kvrow("Mail provider", d.mx_provider || "—") +
    (dmarc && dmarc.rua ? kvrow("DMARC rua", dmarc.rua) : "")
  ));

  // Email reputation (only for email queries)
  if (d.kind === "email") out.push(card("Email Reputation", emailRepBlock(d)));

  // Domain reputation / age
  const ev = d.rdap_events || {};
  out.push(card("Domain Intelligence",
    kvrow("Registrable", d.registrable + (d.subdomain ? "  (subdomain queried)" : "")) +
    kvrow("Registered", d.registered ? d.registered.slice(0,10) : (ev.registration || "?")) +
    kvrow("Age", d.age_days != null ? (d.age_days + " days" + (d.age_days < 90 ? " ⚠" : "")) : "?", d.age_days != null && d.age_days < 90 ? "warn" : "") +
    kvrow("Expires", (ev.expiration || "?").slice(0,10)) +
    kvrow("Registrar", d.registrar || "?") +
    kvrow("TLD risk", d.high_risk_tld ? "HIGH-ABUSE TLD" : "normal", d.high_risk_tld ? "bad" : "good") +
    (d.lookalike && d.lookalike.exact_brand ? kvrow("Brand match", "exact: " + d.lookalike.exact_brand, "good") : "") +
    ((d.lookalike && d.lookalike.flags && d.lookalike.flags.length) ?
      kvrow("Look-alike", d.lookalike.flags.map(f => f.detail).join(" · "), "bad") : "")
  ));

  // Infrastructure
  const i = d.info || {};
  out.push(card("Infrastructure",
    kvrow("Resolved IP", d.ip || "N/A") +
    kvrow("Country", i.country ? (i.country + " (" + (i.countryCode||"") + ")") : "?") +
    kvrow("Location", (i.regionName||"?") + " / " + (i.city||"?")) +
    kvrow("ISP / Org", i.isp || i.org || "?") +
    kvrow("ASN", i.as || "?") +
    kvrow("rDNS", i.reverse || "—") +
    kvrow("Hosting/Proxy", (i.hosting ? "hosting " : "") + (i.proxy ? "proxy/VPN" : ""), i.proxy ? "warn" : "")
  ));

  // VirusTotal
  out.push(card("VirusTotal", vtBlock(d.vt)));

  // AbuseIPDB
  out.push(card("AbuseIPDB (IP)", abuseBlock(d.abuse)));

  // OTX counts every pulse mentioning the domain — meaningless for providers/platforms, so hide it there
  if (!provider && !d.is_platform) out.push(card("Threat Intel (OTX)", otxBlock(d.otx)));
  out.push(card("Threat Feeds", threatFeedsBlock(d)));
  out.push(card("IP Reputation", ipRepBlock(d)));

  // DNS
  out.push(card("DNS Records",
    kvrow("A", (d.a||[]).join(", ") || "None") +
    kvrow("AAAA", (d.aaaa||[]).join(", ") || "None") +
    kvrow("CNAME", (d.cname||[]).join(", ") || "None") +
    kvrow("MX", (d.mx||[]).join("  ") || "None") +
    kvrow("NS", (d.ns||[]).join("  ") || "None") +
    kvrow("SOA", (d.soa||[]).join("  ") || "None") +
    kvrow("TXT", (d.txt||[]).join("\n") || "None", (d.txt && d.txt.length ? "scroll-val" : ""))
  ));

  if (d.crtsh && d.crtsh.subdomains && d.crtsh.subdomains.length)
    out.push(card("Subdomains (crt.sh)", crtBlock(d.crtsh)));

  // skip urlscan for email searches
  return '<div class="grid">' + out.join("") + '</div>' +
    (d.kind === "email" ? "" : urlscanSection(d)) + buildTicket(d);
}

/* ---------- File-hash layout ---------- */
function hashCards(d) {
  const out = [];
  out.push(card("File Analysis (VirusTotal)", vtFileBlock(d.vt_file, d)));
  out.push(card("Sandbox Analysis", sandboxBlock(d)));
  out.push(card("MalwareBazaar", mbBlock(d.mb)));
  out.push(card("Threat Feeds", hashThreatBlock(d)));
  out.push(card("Hash", hashIdsBlock(d)));
  return '<div class="grid">' + out.join("") + '</div>' + buildTicket(d);
}

// Hybrid Analysis + Triage sandbox verdicts
function sandboxBlock(d) {
  const hy = d.hybrid, tr = d.triage;
  if (!hy && !tr) return muted((keyOn('hybrid') || keyOn('triage')) ? 'No sandbox data.' : 'Set HYBRID_API_KEY / TRIAGE_API_KEY for sandbox analysis.');
  let html = "";
  // Hybrid Analysis
  if (hy) {
    if (hy.error) html += kvrow("Hybrid Analysis", hy.error, "warn");
    else if (!hy.found) html += kvrow("Hybrid Analysis", hy.note || "not sandboxed", "");
    else {
      const v = (hy.verdict || "").toLowerCase(), ts = hy.threat_score;
      html += kvrow("Hybrid verdict", (hy.verdict || "?"), (v === "malicious" ? "bad" : (v === "suspicious" ? "warn" : "good")), "Hybrid Analysis (Falcon Sandbox) detonated this file; verdict is its behavioral assessment.") +
        (ts != null ? kvrow("Threat score", ts + "/100", ts >= 70 ? "bad" : (ts >= 30 ? "warn" : "good")) : "") +
        (hy.family ? kvrow("Family", hy.family, "bad") : "") +
        (hy.av_detect != null ? kvrow("AV detection", hy.av_detect + "%") : "") +
        (hy.type ? kvrow("File type", hy.type) : "") +
        (hy.filename ? kvrow("Observed name", hy.filename) : "");
    }
  } else if (keyOn('hybrid')) html += kvrow("Hybrid Analysis", "unavailable", "");
  // Hatching Triage
  if (tr) {
    if (tr === true || !tr.found) html += kvrow("Triage", "not sandboxed", "");
    else {
      const sc = tr.score;
      if (hy) html += '<div class="muted" style="font-size:11px;margin-top:10px;margin-bottom:4px">Hatching Triage</div>';
      html += (sc != null ? kvrow("Triage score", sc + "/10", sc >= 8 ? "bad" : (sc >= 5 ? "warn" : "good"), "Hatching Triage sandbox score (0-10); 8+ is malicious.") : kvrow("Triage", "analyzed")) +
        (tr.family && tr.family.length ? kvrow("Family", tr.family.join(", "), "bad") : "") +
        (tr.tags && tr.tags.length ? kvrow("Tags", tr.tags.join(", ")) : "") +
        (tr.url ? '<div class="scanrow" style="margin-top:6px"><a href="' + esc(safeUrl(tr.url)) + '" target="_blank" rel="noopener">View Triage report ↗</a></div>' : "");
    }
  } else if (keyOn('triage')) html += kvrow("Triage", "unavailable", "");
  return html;
}

function vtFileBlock(v, d) {
  if (!v) return muted(keyOn('vt') ? 'VirusTotal returned no data.' : 'Set VT_API_KEY to enable VirusTotal.');
  if (!v.found) return kvrow("VirusTotal", "file not found (unknown sample)", "") +
    '<div class="muted" style="font-size:11px;margin-top:6px">This hash isn\'t in VirusTotal — it may be a new/unseen file, or benign. Absence isn\'t proof of safety.</div>';
  const s = v.last_analysis_stats || {};
  const total = Object.values(s).reduce((a, b) => a + b, 0) || 0;
  return kvrow("Detections", (s.malicious || 0) + " / " + total + " engines", (s.malicious > 0 ? "bad" : "good"), "How many antivirus engines flagged this file as malicious, out of all that scanned it.") +
    (v.family ? kvrow("Malware family", v.family, "bad", "The malware family/label most engines agree on.") : "") +
    (v.categories && v.categories.length ? kvrow("Categories", v.categories.join(", ")) : "") +
    kvrow("File type", v.type || "?") +
    (v.size ? kvrow("Size", v.size.toLocaleString() + " bytes") : "") +
    (v.meaningful_name ? kvrow("Name", v.meaningful_name) : "") +
    (v.first_seen ? kvrow("First seen", v.first_seen, "", "When this file was first submitted to VirusTotal.") : "") +
    (v.times_submitted ? kvrow("Times submitted", v.times_submitted) : "") +
    (v.tags && v.tags.length ? kvrow("Tags", v.tags.slice(0, 8).join(", ")) : "");
}

function mbBlock(m) {
  if (!m) return muted(keyOn('abusech') ? 'MalwareBazaar returned no data.' : 'Set ABUSECH_API_KEY to enable MalwareBazaar.');
  if (!m.found) return kvrow("MalwareBazaar", "not a known sample", "good") +
    '<div class="muted" style="font-size:11px;margin-top:6px">This hash isn\'t in abuse.ch\'s malware sample database.</div>';
  return kvrow("Status", "KNOWN MALWARE SAMPLE", "bad") +
    (m.signature ? kvrow("Family", m.signature, "bad") : "") +
    (m.file_type ? kvrow("File type", m.file_type) : "") +
    (m.delivery_method ? kvrow("Delivery", m.delivery_method, "", "How this malware is typically delivered (e.g. email attachment, web download).") : "") +
    (m.tags && m.tags.length ? kvrow("Tags", m.tags.join(", ")) : "") +
    (m.first_seen ? kvrow("First seen", m.first_seen) : "") +
    (m.file_name ? kvrow("Filename", m.file_name) : "");
}

function hashThreatBlock(d) {
  const tf = d.threatfox;
  let html = "";
  if (!tf) html += kvrow("ThreatFox", keyOn('abusech') ? "unavailable" : "set ABUSECH_API_KEY", "");
  else if (tf.found) html += kvrow("ThreatFox", "KNOWN IOC" + (tf.malware && tf.malware.length ? " · " + tf.malware.join(", ") : ""), "bad");
  else html += kvrow("ThreatFox", "no known-malware match", "good");
  return html;
}

function hashIdsBlock(d) {
  const v = d.vt_file || {};
  return kvrow("Queried", d.hash_type || "hash") +
    (v.md5 ? kvrow("MD5", v.md5) : (d.hash_type === "MD5" ? kvrow("MD5", d.hash) : "")) +
    (v.sha1 ? kvrow("SHA1", v.sha1) : (d.hash_type === "SHA1" ? kvrow("SHA1", d.hash) : "")) +
    (v.sha256 ? kvrow("SHA256", v.sha256) : (d.hash_type === "SHA256" ? kvrow("SHA256", d.hash) : ""));
}

/* ---------- CIDR / network-block layout ---------- */
function cidrCards(d) {
  const out = [];
  const b = d.block || {}, rip = d.rdap_ip || {};

  out.push(card("Network Block",
    kvrow("CIDR", d.cidr) +
    kvrow("Range", b.min ? (b.min + " – " + b.max) : "?") +
    kvrow("Hosts", b.num_hosts != null ? b.num_hosts : "?") +
    (b.space_desc ? kvrow("Address space", b.space_desc) : "") +
    kvrow("Allocation", rip.name ? (rip.name + (rip.cidr ? "  " + rip.cidr : "")) : "?") +
    (rip.org ? kvrow("Org", rip.org) : "") +
    kvrow("Country", rip.country || "?") +
    (rip.abuse_contact ? kvrow("Abuse contact", rip.abuse_contact) : "")
  ));

  out.push(card("Block Reputation", cidrRepBlock(d.drop)));
  out.push(card("Block Abuse (AbuseIPDB)", cidrAbuseBlock(b, d.block)));

  return '<div class="grid">' + out.join("") + '</div>' + buildTicket(d);
}

function cidrRepBlock(drop) {
  if (!drop) return '<pre class="muted">Spamhaus DROP list unavailable</pre>';
  if (drop.listed) return kvrow("Spamhaus DROP", "LISTED — known criminal netblock", "bad") +
    (drop.sblid ? kvrow("SBL ID", drop.sblid) : "") +
    (drop.entry ? kvrow("List entry", drop.entry) : "") +
    '<div class="muted" style="font-size:11px;margin-top:8px">On the Spamhaus DROP list = the block is controlled by threat actors. Traffic to/from it should be blocked.</div>';
  return kvrow("Spamhaus DROP", "not listed", "good") +
    '<div class="muted" style="font-size:11px;margin-top:8px">Not on the Spamhaus list of known criminal/hijacked netblocks.</div>';
}

function cidrAbuseBlock(b, present) {
  if (!present) return muted(keyOn('abuseipdb') ? 'No AbuseIPDB block data returned.' : 'Set ABUSEIPDB_API_KEY to enable AbuseIPDB.');
  if (b.error) return '<div class="v warn" style="line-height:1.6">' + esc(b.error) + '</div>' +
    '<div class="muted" style="font-size:11px;margin-top:8px">Block-level abuse aggregation needs the AbuseIPDB check-block endpoint. Individual IPs in the range can still be triaged one at a time.</div>';
  const rc = b.reported_count || 0, hosts = b.num_hosts || 256;
  const pct = hosts ? Math.round(rc / hosts * 100) : 0;
  let html = kvrow("Reported addresses", rc + " of " + hosts + "  (" + pct + "%)", rc ? (pct>=8?"bad":"warn") : "good");
  if (!rc) return html + '<div class="muted" style="font-size:11px;margin-top:6px">No addresses in this block have recent abuse reports.</div>';
  html += '<div class="muted" style="font-size:11px;margin:10px 0 4px">Reported addresses (worst first):</div>';
  html += '<div class="subs">' + (b.reported || []).map(r =>
    '<div><span class="' + (r.score>=50?"v bad":(r.score>=25?"v warn":"muted")) + '">' + esc(r.ip) + '</span>' +
    ' <span class="muted">· ' + r.score + '/100 · ' + (r.reports||0) + ' reports' + (r.cc ? ' · ' + esc(r.cc) : '') + (r.last ? ' · ' + esc(r.last) : '') + '</span></div>'
  ).join("") + '</div>';
  return html;
}

/* ---------- IP-address layout ---------- */
function ipCards(d) {
  const out = [];
  const i = d.info || {}, rip = d.rdap_ip || {}, ab = d.abuse || {};

  // Network / allocation
  out.push(card("Network",
    kvrow("IP", d.ip) +
    kvrow("rDNS (PTR)", d.ptr || i.reverse || "—") +
    kvrow("ASN", i.as || (d.vt && d.vt.asn ? "AS" + d.vt.asn : "?")) +
    kvrow("ISP / Org", i.isp || i.org || (d.vt && d.vt.as_owner) || "?") +
    kvrow("Country", i.country ? (i.country + " (" + (i.countryCode||"") + ")") : (rip.country || "?")) +
    kvrow("Location", (i.regionName || "?") + " / " + (i.city || "?")) +
    kvrow("Allocation", rip.name ? (rip.name + (rip.cidr ? "  " + rip.cidr : "")) : "?") +
    (rip.range ? kvrow("Range", rip.range) : "") +
    (rip.abuse_contact ? kvrow("Abuse contact", rip.abuse_contact) : "") +
    kvrow("Hosting/Proxy", (i.hosting ? "hosting " : "") + (i.proxy ? "proxy/VPN/Tor" : "") || "—", i.proxy ? "warn" : "")
  ));

  // AbuseIPDB (rich)
  out.push(card("AbuseIPDB", abuseDetailBlock(ab)));

  // VirusTotal (IP)
  out.push(card("VirusTotal (IP)", vtIpBlock(d.vt)));

  // IPQualityScore — fraud / proxy / VPN / bot
  out.push(card("Fraud & Proxy (IPQS)", ipqsBlock(d)));

  // IP reputation & exposure (GreyNoise + Shodan)
  out.push(card("Reputation & Exposure", ipRepBlock(d)));

  // Passive DNS (VT resolutions)
  out.push(card("Passive DNS", passiveDnsBlock(d.passive_dns)));

  // Threat intel + feeds
  out.push(card("Threat Intel & Feeds", ipThreatBlock(d)));

  return '<div class="grid">' + out.join("") + '</div>' + buildTicket(d);
}

function abuseDetailBlock(a) {
  if (!a) return muted(keyOn('abuseipdb') ? 'No AbuseIPDB record for this IP.' : 'Set ABUSEIPDB_API_KEY to enable AbuseIPDB.');
  const sc = a.abuseConfidenceScore || 0;
  return kvrow("Confidence", sc + "/100", sc>=50?"bad":(sc>=20?"warn":"good"), "AbuseIPDB's confidence (0–100) that this IP is malicious, based on community reports. 50+ is high, 100 is certain.") +
    kvrow("Total reports", (a.totalReports||0) + (a.numDistinctUsers ? "  ·  " + a.numDistinctUsers + " reporters" : ""), "", "How many abuse reports (and distinct reporters) this IP has in the last 90 days.") +
    kvrow("Last reported", a.lastReportedAt || "—") +
    kvrow("Usage type", a.usageType || "?") +
    kvrow("ISP", a.isp || "?") +
    (a.domain ? kvrow("Domain", a.domain) : "") +
    ((a.hostnames && a.hostnames.length) ? kvrow("Hostnames", a.hostnames.join(", ")) : "") +
    kvrow("Tor", a.isTor ? "YES" : "no", a.isTor ? "warn" : "") +
    kvrow("Whitelisted", a.isWhitelisted ? "yes" : "no", a.isWhitelisted ? "good" : "") +
    ((a.top_categories && a.top_categories.length) ? kvrow("Reported for", a.top_categories.join(", "), "bad") : "");
}

function vtIpBlock(v) {
  if (!v) return muted(keyOn('vt') ? 'No VirusTotal record for this IP.' : 'Set VT_API_KEY to enable VirusTotal.');
  const s = v.last_analysis_stats || {};
  return kvrow("Malicious", s.malicious||0, (s.malicious>0?"bad":"good"), VT_TIP.mal) +
    kvrow("Suspicious", s.suspicious||0, (s.suspicious>0?"warn":""), VT_TIP.susp) +
    kvrow("Harmless", s.harmless||0, "", VT_TIP.harm) +
    kvrow("Undetected", s.undetected||0, "", VT_TIP.undet) +
    (v.reputation!=null ? kvrow("Reputation", v.reputation, v.reputation<0?"bad":"", VT_TIP.rep) : "") +
    (v.as_owner ? kvrow("AS owner", v.as_owner) : "") +
    (v.network ? kvrow("Network", v.network) : "") +
    ((v.tags && v.tags.length) ? kvrow("Tags", v.tags.join(", ")) : "");
}

function passiveDnsBlock(p) {
  if (!p || !p.records || !p.records.length)
    return '<pre class="muted">No passive-DNS records (domains that resolved here)</pre>';
  let html = kvrow("Domains seen", p.count || p.records.length);
  html += '<div class="subs" style="margin-top:8px">' +
    p.records.map(r => '<div>' + esc(r.hostname) + (r.date ? ' <span class="muted">· ' + esc(r.date) + '</span>' : '') + '</div>').join("") +
    '</div>';
  return html;
}

function ipThreatBlock(d) {
  const otx = d.otx, tf = d.threatfox, uh = d.urlhaus;
  let html = "";
  // null = source didn't respond (distinct from 0 reports)
  if (!otx) html += kvrow("OTX", "unavailable", "");
  else if (otx.pulse_count > 0) {
    html += kvrow("OTX reports", otx.pulse_count, "bad");
    if (otx.malware_families && otx.malware_families.length) html += kvrow("Malware", otx.malware_families.join(", "), "bad");
    if (otx.adversaries && otx.adversaries.length) html += kvrow("Actors", otx.adversaries.join(", "), "bad");
    if (otx.tags && otx.tags.length) html += kvrow("Tags", otx.tags.join(", "));
  } else html += kvrow("OTX reports", "0 (checked, none)", "good");
  if (!tf) html += kvrow("ThreatFox", "unavailable", "");
  else if (tf.found) html += kvrow("ThreatFox", "KNOWN IOC" + (tf.malware && tf.malware.length ? " · " + tf.malware.join(", ") : ""), "bad");
  else html += kvrow("ThreatFox", "no known-malware match", "good");
  if (!uh) html += kvrow("URLhaus", "unavailable", "");
  else if (uh.found) html += kvrow("URLhaus", "HOSTS MALWARE · " + (uh.url_count||0) + " URLs", "bad");
  else html += kvrow("URLhaus", "not a known malware host", "good");
  return html;
}

function card(title, body) {
  return '<div class="card fade-in"><h3><span class="ttl">' + esc(title) + '</span></h3><div class="kv-wrap">' + body + '</div></div>';
}
function kvrow(k, v, cls, tip) {
  return '<div class="kv' + (tip ? ' has-tip' : '') + '"' + (tip ? ' data-tip="' + esc(tip) + '"' : '') + '>' +
    '<div class="k">' + esc(k) + '</div><div class="v ' + (cls||"") + '">' + esc(v) + '</div></div>';
}

const VT_TIP = {
  mal: "How many security vendors (out of ~90) flagged this as MALICIOUS. Even 1–2 is worth a look; 5+ is a strong signal.",
  susp: "Vendors that flagged this as SUSPICIOUS — questionable but not confirmed malicious.",
  harm: "Vendors that consider this HARMLESS (clean/safe).",
  undet: "Vendors that returned NO detection — they didn't flag it either way. Normal even for good sites.",
  rep: "VirusTotal community REPUTATION score. Negative = bad reputation, positive = good, 0 = neutral.",
  cat: "Content categories vendors assigned to this (e.g. phishing, malware, business)."
};
function vtBlock(v) {
  if (!v) return muted(keyOn('vt') ? 'No VirusTotal record for this indicator.' : 'Set VT_API_KEY to enable VirusTotal.');
  const s = v.last_analysis_stats || {};
  const rep = v.reputation;
  return kvrow("Malicious", s.malicious||0, (s.malicious>0?"bad":"good"), VT_TIP.mal) +
         kvrow("Suspicious", s.suspicious||0, (s.suspicious>0?"warn":""), VT_TIP.susp) +
         kvrow("Harmless", s.harmless||0, "", VT_TIP.harm) +
         kvrow("Undetected", s.undetected||0, "", VT_TIP.undet) +
         (rep!=null ? kvrow("Reputation", rep, rep<0?"bad":"", VT_TIP.rep) : "") +
         (v.categories ? kvrow("Categories", Object.values(v.categories).slice(0,4).join(", "), "", VT_TIP.cat) : "");
}
function abuseBlock(a) {
  if (!a) return muted(!(current && current.ip) ? 'Domain did not resolve to an IP — no IP reputation to check.' : (keyOn('abuseipdb') ? 'No AbuseIPDB record for this IP.' : 'Set ABUSEIPDB_API_KEY to enable AbuseIPDB.'));
  const sc = a.abuseConfidenceScore || 0;
  return kvrow("Confidence", sc + "/100", sc>=50?"bad":(sc>=20?"warn":"good"), "AbuseIPDB's confidence (0–100) that this IP is malicious, based on community reports. 50+ is high, 100 is certain.") +
         kvrow("Total reports", a.totalReports||0, "", "How many times this IP was reported to AbuseIPDB in the last 90 days.") +
         kvrow("Last reported", a.lastReportedAt || "—") +
         kvrow("Country", a.countryCode || "?") +
         kvrow("Usage type", a.usageType || "?", "", "What the IP is used for (e.g. Data Center / CDN, ISP, hosting).") +
         kvrow("Domain", a.domain || "—");
}
function otxBlock(o) {
  if (!o) return muted(keyOn('otx') ? 'OTX returned no data (endpoint may be slow or rate-limited — retry).' : 'Set OTX_API_KEY to enable AlienVault OTX.');
  if (!o.pulse_count) return kvrow("Threat reports", "0", "good") + '<div class="muted" style="font-size:11px;margin-top:6px">No community threat reports reference this indicator.</div>';
  return kvrow("Threat reports", o.pulse_count, "bad") +
    (o.malware_families && o.malware_families.length ? kvrow("Malware", o.malware_families.join(", "), "bad") : "") +
    (o.adversaries && o.adversaries.length ? kvrow("Actors", o.adversaries.join(", "), "bad") : "") +
    (o.tags && o.tags.length ? kvrow("Tags", o.tags.join(", ")) : "") +
    (o.pulses && o.pulses.length ? kvrow("Reports", o.pulses.join(" · ")) : "");
}

function threatFeedsBlock(d) {
  const gsb = d.gsb, tf = d.threatfox, uh = d.urlhaus, plat = !!d.is_platform;
  // on a platform, feed hits are abuse-of-platform → amber "hosted here", not red
  const platTip ="Third parties have hosted malware on this platform. This is abuse of the platform, not the platform being malicious — assess the specific URL/path, not the bare domain.";
  let html = "";
  // Google Safe Browsing
  if (!gsb) html += kvrow("Safe Browsing", keyOn('gsb') ? "unavailable" : "set GSB_API_KEY", "");
  else if (gsb.flagged) html += kvrow("Safe Browsing", (gsb.threats || []).join(", ") || "FLAGGED", "bad");
  else html += kvrow("Safe Browsing", "clean", "good");
  // ThreatFox
  if (!tf) html += kvrow("ThreatFox", keyOn('abusech') ? "unavailable" : "set ABUSECH_API_KEY", "");
  else if (tf.found) html += kvrow("ThreatFox", (plat ? "malware hosted here" : "KNOWN IOC") + (tf.malware && tf.malware.length ? " · " + tf.malware.join(", ") : ""), plat ? "warn" : "bad", plat ? platTip : "");
  else html += kvrow("ThreatFox", "no match", "good");
  // URLhaus
  if (!uh) html += kvrow("URLhaus", keyOn('abusech') ? "unavailable" : "set ABUSECH_API_KEY", "");
  else if (uh.found) html += kvrow("URLhaus", (plat ? "malware hosted here · " : "MALWARE HOST · ") + (uh.url_count || 0) + " URLs", plat ? "warn" : "bad", plat ? platTip : "");
  else html += kvrow("URLhaus", "no match", "good");
  return html;
}

function ipRepBlock(d) {
  if (!d.ip) return '<pre class="muted">No resolved IP</pre>';
  const gn = d.greynoise, s = d.shodan;
  let html = "";
  if (gn && gn.observed) {
    const cls = gn.classification || "unknown";
    html += kvrow("GreyNoise", cls + (gn.name ? " · " + gn.name : ""), cls === "malicious" ? "bad" : (cls === "benign" ? "good" : "warn"));
    if (gn.last_seen) html += kvrow("Last seen", gn.last_seen);
  } else {
    html += kvrow("GreyNoise", gn ? "not observed scanning" : "—");
  }
  if (s) {
    html += kvrow("Open ports", (s.ports && s.ports.length) ? s.ports.join(", ") : "none seen");
    if (s.vulns && s.vulns.length) html += kvrow("CVEs", s.vulns.slice(0, 8).join(", "), "warn");
    if (s.tags && s.tags.length) html += kvrow("Shodan tags", s.tags.join(", "));
  } else {
    html += kvrow("Shodan", "no exposure data");
  }
  return html;
}

// Pull the "what kind of activity" detail from the sources that actually provide it (IPQS free tier
// only says yes/no) — AbuseIPDB categories, OTX malware/actors, ThreatFox family.
function ipAbuseKinds(d) {
  const ab = d.abuse || {}, otx = d.otx || {}, tf = d.threatfox || {}, out = [];
  (ab.top_categories || []).forEach(c => out.push(c));
  (otx.malware_families || []).forEach(m => out.push(m));
  (otx.adversaries || []).forEach(a => out.push(a));
  if (tf.found && tf.malware) (tf.malware || []).forEach(m => out.push(m));
  return [...new Set(out.filter(Boolean))];
}

function ipqsBlock(d) {
  const q = d.ipqs;
  if (!q) return muted(keyOn('ipqs') ? 'No IPQualityScore data for this IP.' : 'Set IPQS_API_KEY to enable IPQualityScore.');
  const fs = q.fraud_score || 0;
  // Fuller anonymizer detail — IPQS flags proxy/vpn/tor separately, with an 'active' (live tunnel) state.
  const kinds = [];
  if (q.tor || q.active_tor) kinds.push("Tor" + (q.active_tor ? " (active exit)" : ""));
  if (q.vpn || q.active_vpn) kinds.push("VPN" + (q.active_vpn ? " (active)" : ""));
  if (q.proxy && !q.vpn && !q.tor) kinds.push("proxy");
  const anon = kinds.length ? kinds.join(", ") : "none detected";
  const abuseKinds = ipAbuseKinds(d);

  return kvrow("Fraud score", fs + "/100", fs>=85?"bad":(fs>=75?"warn":"good"),
      "IPQS fraud/risk score (0–100). 85+ is high risk — but VPN/proxy IPs score high even when not actively abusive, so weigh it against 'recent abuse'.") +
    kvrow("Recent abuse", q.recent_abuse ? "YES" : "no", q.recent_abuse ? "bad" : "good",
      "IPQS has seen this IP in fraud/abuse activity recently (via its honeypot & threat network). The free tier reports yes/no only — the activity type is shown in 'Reported for' below, drawn from AbuseIPDB / OTX / ThreatFox.") +
    (abuseKinds.length ? kvrow("Reported for", abuseKinds.slice(0, 5).join(", "), "bad",
      "The kind of activity this IP has actually been reported for — AbuseIPDB categories, OTX malware/actors, and ThreatFox family. This is where the 'what' behind the abuse flags comes from.") : "") +
    kvrow("Anonymizer", anon, (anon === "none detected") ? "good" : "warn",
      "Which anonymizer types IPQS detects (proxy / VPN / Tor). 'active' means a live tunnel at scan time.") +
    kvrow("Bot / automation", q.bot_status ? "YES" : "no", q.bot_status ? "bad" : "",
      "IPQS classifies traffic from this IP as automated / non-human (scanners, credential-stuffing, scrapers, spam bots). The free tier does not name a specific botnet — check 'Reported for' and the Threat Intel card for any named family.") +
    (q.connection_type ? kvrow("Connection", q.connection_type) : "") +
    (q.isp ? kvrow("ISP", q.isp) : "");
}

function emailRepBlock(d) {
  const dis = d.disify, iq = d.ipqs, e = d.emailrep, hr = d.hudsonrock, xon = d.xon;
  if (!dis && !iq && !e && !hr && !xon) return '<pre class="muted">No email reputation data available.</pre>';
  let html = "";
  // --- address reputation: infostealer + breach exposure ---
  if (hr) {
    if (hr.compromised) {
      html += kvrow("Infostealer exposure", "COMPROMISED — in stealer logs", "bad",
        "This exact address was found in infostealer-malware logs: a device using it was infected and its saved passwords were stolen. The account may be hijacked (account-takeover risk).") +
        kvrow("Infections", hr.count + (hr.last_date ? " · last " + hr.last_date : ""), "bad") +
        ((hr.user_services || hr.corporate_services) ? kvrow("Stolen logins", (hr.user_services||0) + " personal / " + (hr.corporate_services||0) + " corporate", "bad") : "");
    } else {
      html += kvrow("Infostealer exposure", "clean — not in stealer logs", "good",
        "Checks Hudson Rock's infostealer-malware database for this exact address. 'Clean' means it hasn't appeared in known credential-theft logs.");
    }
  }
  if (xon) {
    if (xon.found) {
      html += kvrow("Breach exposure", xon.count + " known breach" + (xon.count === 1 ? "" : "es"), xon.count >= 8 ? "warn" : "",
        "Data breaches this address has appeared in (via XposedOrNot). Breach presence is common for real, long-lived addresses — it's exposure, not proof of malice — but heavy exposure raises phishing / credential-stuffing risk.") +
        ((xon.breaches && xon.breaches.length) ? kvrow("Seen in", xon.breaches.slice(0, 8).join(", ") + (xon.count > 8 ? ", +" + (xon.count - 8) + " more" : "")) : "");
    } else {
      html += kvrow("Breach exposure", "no known breaches", "good",
        "This address wasn't found in XposedOrNot's breach database — either it's clean, or it's a new / unused address.");
    }
  }
  // --- validation (Disify): format & deliverability, not mailbox existence ---
  if (dis) {
    if (hr || xon) html += '<div class="muted" style="font-size:11px;margin-top:10px;margin-bottom:4px">Validation (Disify)</div>';
    const sig = dis.signals || [];
    html += kvrow("Format", dis.format ? "well-formed" : "invalid", dis.format ? "good" : "bad",
        "Whether the address is syntactically valid (looks like name@domain). Syntax only — it does NOT confirm the mailbox actually exists.") +
      kvrow("Domain can receive mail", dis.dns ? "yes (MX present)" : "NO (no MX)", dis.dns ? "good" : "bad",
        "Whether the domain has mail (MX) servers. 'Yes' means the domain CAN receive email — not that this specific inbox exists.") +
      kvrow("Disposable", dis.disposable ? "YES" : "no", dis.disposable ? "bad" : "good") +
      kvrow("Free provider", dis.free ? "yes" : "no") +
      (dis.role ? kvrow("Role account", "yes (e.g. admin@ / info@)", "warn") : "") +
      (sig.length ? kvrow("Signals", sig.join(", "), sig.indexOf("high_entropy") >= 0 ? "warn" : "") : "");
  }
  // IPQualityScore (optional, if key)
  if (iq) {
    if (dis) html += '<div class="muted" style="font-size:11px;margin-top:10px;margin-bottom:4px">IPQualityScore</div>';
    const fs = iq.fraud_score || 0;
    html += kvrow("Fraud score", fs + "/100", fs >= 85 ? "bad" : (fs >= 60 ? "warn" : "good")) +
      kvrow("Deliverability", iq.deliverability || "?", iq.deliverability === "low" ? "warn" : "") +
      kvrow("Recent abuse", iq.recent_abuse ? "YES" : "no", iq.recent_abuse ? "bad" : "good") +
      kvrow("In breaches", iq.leaked ? "YES" : "no", iq.leaked ? "warn" : "good") +
      kvrow("Disposable", iq.disposable ? "YES" : "no", iq.disposable ? "bad" : "good") +
      (iq.honeypot ? kvrow("Honeypot", "YES", "bad") : "") +
      (iq.spam_trap_score && iq.spam_trap_score !== "none" ? kvrow("Spam trap", iq.spam_trap_score, "warn") : "") +
      (iq.first_seen ? kvrow("First seen", iq.first_seen) : "");
  }
  // EmailRep (supplementary)
  if (e) {
    if (iq) html += '<div class="muted" style="font-size:11px;margin-top:10px;margin-bottom:4px">EmailRep.io</div>';
    const rep = (e.reputation || "none");
    html += kvrow("Reputation", rep, rep === "high" ? "good" : (rep === "low" ? "bad" : "warn")) +
      kvrow("Suspicious", e.suspicious ? "YES" : "no", e.suspicious ? "bad" : "good") +
      ((e.profiles && e.profiles.length) ? kvrow("Profiles", e.profiles.join(", ")) : "");
  }
  html += '<div class="muted" style="font-size:11px;margin-top:12px">Covers format, deliverability &amp; reputation (breach / infostealer exposure) — it does not confirm the specific mailbox exists.</div>';
  return html;
}

function liveBtn(label) {
  return '<button class="livebtn" id="liveScanBtn" onclick="runLiveScan()">' + label + '</button>';
}

function urlscanSection(d) {
  return '<div class="card us-section fade-in"><h3><span class="ttl">urlscan.io</span></h3>' +
    '<div id="urlscanBody">' + urlscanBlock(d.urlscan) + '</div></div>';
}

// warning banner for an off-domain redirect
function redirectAlert(toReg) {
  return '<div class="redirect-alert fade-in"><div class="ra-icon">⚠</div><div class="ra-body">' +
    '<div class="ra-title">Likely malicious redirect</div>' +
    '<div class="ra-text">This domain forwards visitors to <b>' + esc(toReg) + '</b> — an unrelated site. ' +
    'Silent off-domain redirects are a common phishing and parked-domain tactic. ' +
    'Do not trust links to this domain without further investigation.</div>' +
    '</div></div>';
}

// two-column: info left, screenshot right
function usGrid(info, shotHtml, danger) {
  if (!shotHtml) return info;
  return '<div class="us-grid"><div class="us-info">' + info + '</div>' +
         '<div class="us-shot' + (danger ? ' danger' : '') + '">' + shotHtml + '</div></div>';
}

// nudge a re-scan if the newest urlscan is >30 days old
function staleScanNote(t) {
  if (!t) return "";
  const d = new Date(t);
  if (isNaN(d.getTime())) return "";
  const days = Math.floor((Date.now() - d.getTime()) / 86400000);
  if (days < 30) return "";
  return '<div class="stale-note">↻ Newest urlscan is <b>' + days + ' days old</b> (' +
    esc((t || "").slice(0, 10)) + '). The site may have changed — run a fresh scan below for current results.</div>';
}

function urlscanBlock(u) {
  if (!u || !u.results || !u.results.length) {
    return '<div class="muted" style="margin-bottom:16px">No prior urlscan submissions for this target. Run a fresh scan to capture a live screenshot and detect redirects.</div>' +
           liveBtn('▶ Run live scan');
  }
  const top = u.results[0];
  let info = staleScanNote(top.time);
  info += urlscanVerdictRows(u);
  info += kvrow("Recent scans", u.count || u.results.length);
  info += u.results.slice(0, 4).map(r =>
    '<div class="scanrow"><a href="' + esc(safeUrl(r.result)) + '" target="_blank" rel="noopener">' +
    esc(r.url || "") + '</a><div class="muted" style="font-size:11px">' +
    esc((r.time || "").slice(0, 10)) + '</div></div>').join("");
  info += '<div style="margin-top:20px">' + liveBtn('▶ Re-scan live') + '</div>';
  const danger = !!(u.redirect && u.redirect.offsite);
  const shotHtml = (top && top.screenshot) ? shot(top.screenshot, top.result, top.url) : "";
  return (danger ? redirectAlert(u.redirect.to_reg) : "") + usGrid(info, shotHtml, danger);
}

// shared verdict/redirect rows (stored + live)
function urlscanVerdictRows(u) {
  let html = "";
  const v = u.verdict;
  if (v) {
    html += kvrow("urlscan engine", v.malicious ? "MALICIOUS" : "no detection", v.malicious ? "bad" : "");
    if (v.score) html += kvrow("Engine score", v.score);
    if (v.brands && v.brands.length) html += kvrow("Impersonates", v.brands.join(", "), "bad");
    if (v.categories && v.categories.length) html += kvrow("Categories", v.categories.join(", "));
  }
  if (u.redirect && u.redirect.offsite) {
    html += kvrow("⚠ Redirect", "Lands on " + u.redirect.to_reg + " — off-domain", "bad");
  } else if (u.final_domain) {
    html += kvrow("Lands on", u.final_domain);
  }
  return html;
}

function shot(url, link, caption) {
  return '<a href="' + esc(safeUrl(link || url)) + '" target="_blank" rel="noopener">' +
    '<img src="' + esc(safeUrl(url)) + '" alt="urlscan screenshot" loading="lazy"></a>' +
    (caption ? '<div class="us-cap">' + esc(caption) + '</div>' : '');
}

async function runLiveScan() {
  if (!current) return;
  const body = $("urlscanBody");
  const target = current.url || current.domain;
  body.innerHTML ='<div class="loader fade-in" style="margin:6px 0"><div class="loader-bar"><i id="liveFill"></i></div>' +
    '<div class="loader-step"><span class="lstep" id="liveStep">Submitting <b>' + esc(target) + '</b> to urlscan…</span>' +
    '<span class="lpct" id="livePct">0%</span></div></div>';
  let pct = 0;
  const timer = setInterval(function () {
    // ease toward ~92%, gently (urlscan is slow)
    pct += Math.max(0.4, (92 - pct) * 0.045);
    if (pct > 92) pct = 92;
    const fill = $("liveFill"), p = $("livePct");
    if (fill) fill.style.width = pct + "%";
    if (p) p.textContent = Math.round(pct) + "%";
  }, 500);
  const finishBar = function () {
    clearInterval(timer);
    const fill = $("liveFill"), p = $("livePct");
    if (fill) fill.style.width = "100%";
    if (p) p.textContent = "100%";
  };
  try {
    const f = new FormData(); f.append("target", target);
    const sub = await (await fetch("/urlscan/submit", { method: "POST", body: f })).json();
    if (!sub.uuid) { clearInterval(timer); body.innerHTML = '<div class="v bad">' + esc(sub.error || "Submit failed") + '</div>' + liveBtn('▶ Retry'); return; }
    const step = $("liveStep");
    // poll for the result (~10-30s)
    for (let i = 0; i < 16; i++) {
      await new Promise(r => setTimeout(r, 3000));
      if (step) step.innerHTML = 'Scanning <b>' + esc(target) + '</b>… (' + ((i + 1) * 3) + 's)';
      const res = await (await fetch("/urlscan/result/" + sub.uuid + "?reg=" + encodeURIComponent(current.registrable || ""))).json();
      if (res.ready) { finishBar(); await new Promise(r => setTimeout(r, 180)); renderLiveResult(res); return; }
    }
    clearInterval(timer);
    body.innerHTML = '<div class="muted">Scan is taking longer than expected. ' +
      '<a href="https://urlscan.io/result/' + esc(sub.uuid) + '/" target="_blank" rel="noopener">View on urlscan ↗</a></div>' + liveBtn('▶ Re-scan live');
  } catch (e) {
    clearInterval(timer);
    body.innerHTML = '<div class="v bad">Live scan failed (network).</div>' + liveBtn('▶ Retry');
  }
}

function renderLiveResult(res) {
  const body = $("urlscanBody");
  let info = '<div class="muted" style="font-size:11px;margin-bottom:12px">↻ Fresh scan · ' + esc((res.time || "").slice(0, 16).replace("T", " ")) + '</div>';
  info += urlscanVerdictRows(res);
  if (res.final_url) info += '<div class="scanrow"><a href="' + esc(safeUrl(res.result)) + '" target="_blank" rel="noopener">' + esc(res.final_url) + '</a></div>';
  info += '<div style="margin-top:20px">' + liveBtn('▶ Re-scan live') + '</div>';
  const danger = !!(res.redirect && res.redirect.offsite);
  const shotHtml = res.screenshot ? shot(res.screenshot, res.result, res.final_url) : "";
  let html = usGrid(info, shotHtml, danger);
  if (danger) html = redirectAlert(res.redirect.to_reg) + html;
  body.innerHTML = html;
}
function crtBlock(c) {
  if (!c || !c.subdomains) return '<pre class="muted">No certificate data</pre>';
  return '<div class="kv"><div class="k">Total</div><div class="v">' + c.count + '</div></div>' +
    '<div class="subs" style="margin-top:8px">' + c.subdomains.map(s => '<div>' + esc(s) + '</div>').join("") + '</div>';
}
/* ---------- ticket summary: three audiences ---------- */
let ticketFmts = {};

const TICKET_TABS = [
  ["security", "Security Team"],
  ["executive", "Executive"],
  ["enduser", "End User"],
];
function buildTicket(d) {
  ticketFmts = {
    security: fmtSecurity(d),
    executive: fmtExecutive(d),
    enduser: fmtEndUser(d),
  };
  const tabs = TICKET_TABS.map(function (t, i) {
    return '<button class="ttab' + (i === 0 ? ' active' : '') + '" data-fmt="' + t[0] +
      '" onclick="selectTicket(\'' + t[0] + '\')">' + t[1] + '</button>';
  }).join("");
  return '<div class="ticket fade-in"><div class="ticket-h">' +
    '<span class="thd">Report Summary</span>' +
    '<div class="ticket-tabs">' + tabs +
    '<button class="copybtn" onclick="copySummary()">Copy</button></div></div>' +
    '<pre id="ticket" class="ticket-body">' + ticketBody(ticketFmts.security) + '</pre></div>';
}

// first line of the report is its title
function splitReport(text) {
  const lines = (text || "").split("\n");
  const title = (lines.shift() || "").trim();
  while (lines.length && lines[0].trim() === "") lines.shift();
  return { title: title, body: lines.join("\n") };
}
// render with the title line highlighted
function ticketBody(text) {
  const r = splitReport(text);
  return '<span class="rt-title">' + esc(r.title) + '</span>\n\n' + esc(r.body);
}

function selectTicket(fmt) {
  const t = $("ticket");
  if (t) t.innerHTML = ticketBody(ticketFmts[fmt] || "");
  document.querySelectorAll('.ttab').forEach(function (b) {
    b.classList.toggle('active', b.getAttribute('data-fmt') === fmt);
  });
}

function recAction(d) {
  if (d.unresolved) return "No action needed on the name itself — it has no DNS records and does not resolve (appears unregistered or inactive). If it was expected to be live, double-check the spelling. If a message claimed to come from it, treat that claim as forged: the domain cannot send or receive mail.";
  if (d.kind === "hash") return ({
    "Likely Malicious": "Block this hash in EDR (CrowdStrike Falcon); hunt for the file across endpoints; quarantine/purge any email carrying it (Mimecast).",
    "Suspicious": "Detonate in a sandbox and monitor; block pending analysis if it arrived via email.",
    "Low–Moderate": "Low confidence; note the hash and monitor. Unknown-to-VT files may warrant sandboxing.",
    "Likely Legitimate": "No action required; the file is not flagged as malicious."
  })[d.verdict] || "Review manually.";
  if (d.kind === "cidr") return ({
    "Likely Malicious": "Consider blocking or closely monitoring this range at the firewall; investigate the worst offenders individually and check logs for connections from the block.",
    "Suspicious": "Monitor the range; review the reported addresses and correlate with recent alerts before any block.",
    "Low–Moderate": "Low block-level risk; note the reported addresses and continue monitoring.",
    "Likely Legitimate": "No block-level action required; the range shows no significant abuse."
  })[d.verdict] || "Review manually.";
  if (d.kind === "ip") return ({
    "Likely Malicious": "Block the IP at the firewall/EDR (CrowdStrike Falcon); hunt for existing connections to it in proxy/firewall logs; check for beaconing.",
    "Suspicious": "Monitor and rate-limit; correlate with recent alerts; consider a temporary block pending review.",
    "Low–Moderate": "Low confidence of malice; document and monitor for repeat connections.",
    "Likely Legitimate": "No action required; treat as normal infrastructure."
  })[d.verdict] || "Review manually.";
  if (d.is_tenant) return ({
    "Likely Malicious": "Block this specific hostname (not the whole platform) at Mimecast/Falcon; search & purge delivered messages; hunt for prior clicks. Report the site to " + d.registrable + " for takedown.",
    "Suspicious": "Quarantine pending review and block the specific hostname, not the parent platform. Verify out-of-band with the recipient — free-host subdomains are a common phishing pattern.",
    "Low–Moderate": "Nothing conclusive, but this is an unverifiable free-host site: run a live urlscan and judge the page content before releasing.",
    "Likely Legitimate": "No adverse intel, but the platform's reputation is not this site's — confirm the page is what the recipient expected before treating it as trusted."
  })[d.verdict] || "Judge this on page content — run a live urlscan.";
  return ({
    "Likely Malicious": "Block domain/sender at Mimecast and CrowdStrike Falcon; search & purge delivered messages; hunt for prior clicks/interaction.",
    "Suspicious": "Quarantine pending review; verify legitimacy out-of-band with the recipient/sender; monitor for related indicators.",
    "Low–Moderate": "Low confidence of malice; document and monitor; release if quarantined and contextually expected.",
    "Likely Legitimate": "No action required; treat as legitimate. Release from quarantine if held."
  })[d.verdict] || "Review manually.";
}

function authLine(d) {
  return "DMARC " + (d.dmarc_parsed ? "p=" + d.dmarc_parsed.policy : "MISSING") +
    ", SPF " + (d.spf_parsed ? "present" : "MISSING") +
    ", DKIM " + (d.dkim && d.dkim.length ? "present" : "none found");
}

function fmtSecurityCIDR(d) {
  const b = d.block || {}, rip = d.rdap_ip || {};
  const L = [];
  L.push("SECURITY TEAM — NETWORK BLOCK REPORT");
  L.push("");
  L.push("IOC:      " + d.defanged + "  (network block)");
  L.push("Verdict:  " + d.verdict + "  (risk " + d.score + "/100)");
  if (d.drop && d.drop.listed) L.push("Spamhaus: DROP-LISTED — criminal netblock (" + (d.drop.sblid || "") + ")");
  else if (d.drop) L.push("Spamhaus: not on DROP list");
  if (b.min) L.push("Range:    " + b.min + " – " + b.max + "  ·  " + (b.num_hosts || "?") + " hosts");
  if (b.space_desc) L.push("Space:    " + b.space_desc);
  if (rip.name || rip.org) L.push("Owner:    " + (rip.name || rip.org) + (rip.abuse_contact ? "  ·  abuse: " + rip.abuse_contact : ""));
  L.push("Abuse:    " + (b.reported_count || 0) + " reported address(es) in range");
  if (d.reasons && d.reasons.length) L.push("Signals:  " + d.reasons.join(" | "));
  const worst = (b.reported || []).slice(0, 8);
  if (worst.length) {
    L.push("");
    L.push("Worst offenders:");
    worst.forEach(r => L.push("  " + r.ip + "  " + r.score + "/100  (" + (r.reports || 0) + " reports" + (r.cc ? ", " + r.cc : "") + ")"));
  }
  L.push("");
  L.push("Recommended action: " + recAction(d));
  return L.join("\n");
}

function fmtSecurityHash(d) {
  const v = d.vt_file || {}, mb = d.mb || {};
  const L = [];
  L.push("SECURITY TEAM — FILE HASH REPORT");
  L.push("");
  L.push("IOC:      " + d.hash + "  (" + (d.hash_type || "hash") + ")");
  L.push("Verdict:  " + d.verdict + "  (risk " + d.score + "/100)");
  if (v.found) {
    const s = v.last_analysis_stats || {}, total = Object.values(s).reduce((a, b) => a + b, 0) || 0;
    L.push("VirusTotal: " + (s.malicious || 0) + "/" + total + " engines malicious" + (v.family ? "  ·  " + v.family : ""));
    if (v.type) L.push("File:     " + v.type + (v.size ? "  ·  " + v.size + " bytes" : "") + (v.meaningful_name ? '  ·  "' + v.meaningful_name + '"' : ""));
    if (v.first_seen) L.push("First seen: " + v.first_seen);
  } else if (v && v.found === false) {
    L.push("VirusTotal: not found (unknown sample)");
  }
  if (mb.found) L.push("MalwareBazaar: KNOWN SAMPLE" + (mb.signature ? "  ·  " + mb.signature : "") + (mb.delivery_method ? "  ·  delivery: " + mb.delivery_method : ""));
  if (d.reasons && d.reasons.length) L.push("Signals:  " + d.reasons.join(" | "));
  L.push("");
  L.push("Recommended action: " + recAction(d));
  return L.join("\n");
}

// Security Team — full technical report
function fmtSecurity(d) {
  if (d.kind === "hash") return fmtSecurityHash(d);
  if (d.kind === "cidr") return fmtSecurityCIDR(d);
  if (d.kind === "ip") return fmtSecurityIP(d);
  const i = d.info || {};
  const L = [];
  L.push("SECURITY TEAM — TRIAGE REPORT");
  L.push("");
  L.push("IOC:      " + d.defanged + "  (" + d.kind + ")");
  L.push("Verdict:  " + d.verdict + (d.unresolved ? "" : "  (risk " + d.score + "/100)"));
  if (d.unresolved) {
    L.push("DNS:      no records (no A / MX / NS); no registration found");
    L.push("Status:   does not resolve — appears unregistered or inactive");
    L.push("");
    L.push("Recommended action: " + recAction(d));
    return L.join("\n");
  }
  if (d.ip) L.push("Hosting:  " + d.ip + "  [" + (i.country || "?") + " · " + (i.org || i.isp || "?") + "]");
  if (d.registered) L.push("Domain:   registered " + d.registered.slice(0, 10) + (d.age_days != null ? " (" + d.age_days + "d old)" : ""));
  if (d.mx_provider) L.push("Mail:     " + d.mx_provider);
  L.push("Auth:     " + authLine(d));
  if (d.urlscan && d.urlscan.redirect && d.urlscan.redirect.offsite) L.push("Redirect: off-domain to " + d.urlscan.redirect.to_reg);
  if (d.flags && d.flags.length) L.push("Flags:    " + d.flags.map(f => f.cat + " (" + f.detail + ")").join("; "));
  if (d.reasons && d.reasons.length) L.push("Signals:  " + d.reasons.join(" | "));
  L.push("");
  L.push("Recommended action: " + recAction(d));
  return L.join("\n");
}

function fmtSecurityIP(d) {
  const i = d.info || {}, rip = d.rdap_ip || {}, ab = d.abuse || {}, vt = d.vt || {};
  const L = [];
  L.push("SECURITY TEAM — IP TRIAGE REPORT");
  L.push("");
  L.push("IOC:      " + d.defanged + "  (ip)");
  L.push("Verdict:  " + d.verdict + "  (risk " + d.score + "/100)");
  L.push("Network:  " + (i.as || (vt.asn ? "AS" + vt.asn : "?")) + "  ·  " + (i.country || "?") + "  ·  " + (i.isp || i.org || vt.as_owner || "?"));
  if (rip.name || rip.cidr) L.push("Alloc:    " + (rip.name || "?") + (rip.cidr ? "  " + rip.cidr : ""));
  if (d.ptr || i.reverse) L.push("rDNS:     " + (d.ptr || i.reverse));
  if (ab && Object.keys(ab).length) L.push("AbuseIPDB: " + (ab.abuseConfidenceScore||0) + "/100  ·  " + (ab.usageType||"?") + (ab.isTor ? "  ·  Tor" : "") + "  ·  " + (ab.totalReports||0) + " reports");
  if (ab.top_categories && ab.top_categories.length) L.push("Reported: " + ab.top_categories.join(", "));
  if (d.otx && d.otx.passive_dns_count) L.push("PassiveDNS: " + d.otx.passive_dns_count + " domains resolved here");
  if (d.reasons && d.reasons.length) L.push("Signals:  " + d.reasons.join(" | "));
  L.push("");
  L.push("Recommended action: " + recAction(d));
  return L.join("\n");
}

function ipPoints(d) {
  const pts = [];
  const ab = d.abuse || {}, vt = d.vt || {}, iq = d.ipqs || {};
  if ((ab.abuseConfidenceScore || 0) >= 50) pts.push("This IP has a high abuse-confidence score and has been widely reported for malicious activity.");
  if ((vt.last_analysis_stats || {}).malicious > 0) pts.push("Security vendors flag this IP as malicious.");
  if (iq.recent_abuse) pts.push("IPQualityScore has seen recent fraud/abuse from this IP (fraud score " + (iq.fraud_score || 0) + "/100).");
  if (iq.bot_status) pts.push("IPQualityScore detects automated bot activity from this IP.");
  if (d.threatfox && d.threatfox.found) pts.push("It matches a known malware/command-and-control indicator.");
  if (d.otx && d.otx.pulse_count > 0 && ((d.otx.malware_families || []).length || (d.otx.adversaries || []).length)) pts.push("It is linked to reported threat activity (associated malware or threat actors).");
  if (ab.isTor || iq.active_tor) pts.push("It is a Tor exit node, which is commonly used to anonymize malicious traffic.");
  else if (iq.active_vpn) pts.push("It is an active VPN endpoint (anonymized traffic).");
  if (ab.top_categories && ab.top_categories.length) pts.push("Recent abuse reports include: " + ab.top_categories.slice(0, 3).join(", ") + ".");
  if (!pts.length) pts.push("No major threat-intelligence sources flag this IP; its infrastructure and reputation look normal.");
  return pts.slice(0, 5);
}

function cidrPoints(d) {
  const b = d.block || {}, pts = [];
  if (d.drop && d.drop.listed) pts.push("This range is on the Spamhaus DROP list — it is a netblock known to be controlled by criminals, and traffic to/from it should be blocked.");
  const rc = b.reported_count || 0, hosts = b.num_hosts || 256;
  const pct = hosts ? Math.round(rc / hosts * 100) : 0;
  if (rc) {
    pts.push(rc + " of " + hosts + " addresses in this range (" + pct + "%) have recent abuse reports.");
    const high = (b.reported || []).filter(r => r.score >= 50).length;
    if (high) pts.push(high + " address(es) carry a high abuse-confidence score (50+).");
  } else {
    pts.push("No addresses in this range have recent abuse reports; the block looks clean.");
  }
  const rip = d.rdap_ip || {};
  if (rip.name || rip.org) pts.push("The block is allocated to " + (rip.name || rip.org) + ".");
  return pts.slice(0, 5);
}

function hashPoints(d) {
  const v = d.vt_file || {}, mb = d.mb || {}, pts = [];
  if (v.found) {
    const mal = (v.last_analysis_stats || {}).malicious || 0;
    if (mal > 0) pts.push(mal + " antivirus engines detect this file as malicious" + (v.family ? " (" + v.family + ")" : "") + ".");
    else pts.push("No antivirus engines flag this file; it appears clean.");
  } else if (v && v.found === false) {
    pts.push("This file is not known to VirusTotal — it may be new/unseen, so absence of detections is not proof it is safe.");
  }
  if (mb.found) pts.push("It is a confirmed malware sample in abuse.ch's MalwareBazaar" + (mb.signature ? " (" + mb.signature + ")" : "") + ".");
  const hy = d.hybrid || {}, tr = d.triage || {};
  if (hy.found && ((hy.verdict || "").toLowerCase() === "malicious" || (hy.threat_score || 0) >= 70)) pts.push("A malware sandbox (Hybrid Analysis) detonated this file and assessed it as malicious" + (hy.family ? " (" + hy.family + ")" : "") + ".");
  if (tr.found && (tr.score || 0) >= 8) pts.push("A second sandbox (Hatching Triage) also scored this file as malicious" + (tr.family && tr.family.length ? " (" + tr.family.join(", ") + ")" : "") + ".");
  if (d.threatfox && d.threatfox.found) pts.push("It matches a known malicious indicator in ThreatFox.");
  if (!pts.length) pts.push("No malware databases flag this file.");
  return pts.slice(0, 5);
}

function stakeholderPoints(d) {
  if (d.kind === "ip") return ipPoints(d);
  if (d.kind === "cidr") return cidrPoints(d);
  if (d.kind === "hash") return hashPoints(d);
  if (d.unresolved) {
    const p = ["This " + (d.kind === "email" ? "email domain" : "domain") + " has no DNS records (no A, MX, or NS) and no registration — it does not resolve and appears unregistered or inactive."];
    p.push(d.kind === "email"
      ? "Because the domain does not exist, the address cannot receive mail and is not a valid sender."
      : "It cannot host a website or receive email right now. This is not malicious in itself — the name simply is not live.");
    return p;
  }
  const pts = [];
  // address-level compromise is the strongest email signal — surface first
  if (d.hudsonrock && d.hudsonrock.compromised)
    pts.push("This exact address appears in infostealer-malware logs" + (d.hudsonrock.last_date ? " (most recently " + d.hudsonrock.last_date + ")" : "") + " — its saved credentials were stolen, so the account may be compromised and used for account-takeover or phishing.");
  // platform: feed hits are third-party abuse, not the platform being bad
  if (d.is_platform && ((d.threatfox && d.threatfox.found) || (d.urlhaus && d.urlhaus.found)))
    pts.push("This is a major hosting/content platform" + (d.urlhaus && d.urlhaus.found ? " (" + (d.urlhaus.url_count || 0) + " malware URLs in URLhaus)" : "") + ". Third parties abuse it to host malware, which is why it appears in threat feeds — this does not mean the platform itself is malicious. Judge the specific URL or path, not the bare domain.");
  // known-bad / actor correlation — skipped for providers and platforms
  if (!d.is_provider && !d.is_platform && ((d.gsb && d.gsb.flagged) || (d.threatfox && d.threatfox.found) || (d.urlhaus && d.urlhaus.found)))
    pts.push("It appears in recognized threat databases as known-malicious infrastructure.");
  if (!d.is_provider && !d.is_platform && d.otx && d.otx.pulse_count > 0 && ((d.otx.malware_families || []).length || (d.otx.adversaries || []).length))
    pts.push("It is linked to reported threat activity (associated malware or threat actors).");
  if (d.ipqs && (d.ipqs.recent_abuse || (d.ipqs.fraud_score || 0) >= 85))
    pts.push("This email address shows signs of fraudulent or abusive activity.");
  if (d.disify && d.disify.disposable)
    pts.push("It uses a disposable/throwaway email provider — unusual for a legitimate business sender.");
  else if (d.disify && d.disify.dns === false)
    pts.push("Its domain has no mail (MX) records, so it cannot actually receive email — a common trait of spoofed or fake senders.");
  // breach exposure — context, not proof of malice
  if (d.xon && d.xon.found && d.xon.count >= 1 && !(d.hudsonrock && d.hudsonrock.compromised))
    pts.push("The address has been exposed in " + d.xon.count + " known data breach" + (d.xon.count === 1 ? "" : "es") + " — normal for a real, long-lived address, but it raises the odds of credential-stuffing or targeted phishing.");
  if (d.is_provider) {
    // consumer provider — domain intel is about the provider, not the mailbox
    pts.push("This is a valid address at a major consumer mail provider (" + d.registrable + "). The domain details describe the provider's mail service, not this specific mailbox — the sender itself is judged by the Email Reputation checks (breach / infostealer exposure).");
    if (!(d.hudsonrock && d.hudsonrock.compromised) && !(d.xon && d.xon.found) && !(d.ipqs && (d.ipqs.recent_abuse || (d.ipqs.fraud_score || 0) >= 85)))
      pts.push("The address itself shows no infostealer or breach exposure and no abuse signals.");
  } else {
    if (d.is_tenant) {
      // The platform's registration age is NOT this site's — never let it read as legitimacy.
      pts.push("This is a user-created site on " + d.registrable + ", a free/shared hosting platform where anyone can publish in minutes. The registration age and registrar shown belong to " + d.registrable + " itself, not to this site, so they are no evidence it is trustworthy — these hosts are heavily abused for phishing.");
      pts.push("Judge this one on its own content and behaviour: run a live urlscan below and check what the page actually does.");
    } else if (d.age_days != null) {
      if (d.age_days < 90) pts.push("The domain was registered very recently (" + d.age_days + (d.age_days === 1 ? " day" : " days") + " ago) — a common trait of fraudulent or throwaway sites.");
      else pts.push("The domain has been established for " + Math.floor(d.age_days / 365) + "+ years, consistent with a legitimate organization.");
    }
    // Mail-auth only matters for a domain that sends mail — a hosting tenant is a website, not a sender.
    const dmarcBad = !d.dmarc_parsed || (d.dmarc_parsed.policy || "none").toLowerCase() === "none";
    if (!d.is_tenant) {
      if (dmarcBad || !d.spf_parsed) pts.push("Its email protections are incomplete, so messages claiming to come from it can be more easily spoofed.");
      else pts.push("Its email protections (SPF/DKIM/DMARC) are properly configured, making impersonation difficult.");
    }
    if (d.urlscan && d.urlscan.redirect && d.urlscan.redirect.offsite) pts.push("When opened, the link sends users to an unrelated website (" + d.urlscan.redirect.to_reg + ") — a hallmark of scams and parked domains.");
  }
  if (!d.is_provider && d.vt && (d.vt.last_analysis_stats || {}).malicious > 0) pts.push("Security vendors have flagged this domain as malicious.");
  if (!d.is_provider && d.abuse && (d.abuse.abuseConfidenceScore || 0) >= 25) pts.push("The hosting address has been reported for abusive activity.");
  if (!pts.length || (d.verdict === "Likely Legitimate" && pts.length < 2)) pts.push("No threat-intelligence sources flagged it, and its infrastructure looks normal.");
  return pts.slice(0, 5);
}

function riskRating(d) {
  return ({
    "Likely Malicious": "HIGH", "Suspicious": "ELEVATED",
    "Low–Moderate": "LOW–MODERATE", "Likely Legitimate": "LOW", "No DNS Record": "N/A"
  })[d.verdict] || "UNKNOWN";
}

// Executive — decision-oriented risk brief
function fmtExecutive(d) {
  const ip = d.kind === "ip";
  const cidr = d.kind === "cidr";
  const hash = d.kind === "hash";
  const bottom = (hash ? {
    "Likely Malicious": "This file is identified as malware and should be blocked and removed from any system it reached.",
    "Suspicious": "This file shows suspicious characteristics and should be contained and analyzed before use.",
    "Low–Moderate": "This file carries limited risk but is not clearly trusted; handle with caution.",
    "Likely Legitimate": "This file is not flagged as malicious by security tooling."
  } : cidr ? {
    "Likely Malicious": "This network range shows widespread abuse and should be treated as hostile; consider blocking or closely monitoring it.",
    "Suspicious": "This range contains some abusive addresses and warrants caution and monitoring.",
    "Low–Moderate": "This range carries limited risk. Routine monitoring is sufficient.",
    "Likely Legitimate": "This range shows no significant abuse and appears to be normal infrastructure."
  } : ip ? {
    "Likely Malicious": "This internet address is assessed as malicious and should be blocked. Traffic to or from it risks intrusion, data theft, or malware command-and-control.",
    "Suspicious": "This address shows warning signs and should be treated with caution pending a brief investigation.",
    "Low–Moderate": "This address carries limited risk. Normal monitoring is sufficient.",
    "Likely Legitimate": "This address appears to be normal infrastructure and poses no significant risk at this time."
  } : {
    "Likely Malicious": "This domain is assessed as malicious and should be blocked. Allowing it exposes staff to phishing, business email compromise, and potential financial loss.",
    "Suspicious": "This domain shows warning signs and should be treated with caution pending a brief investigation.",
    "Low–Moderate": "This domain carries limited risk. Normal precautions and monitoring are sufficient.",
    "Likely Legitimate": "This domain appears legitimate and poses no significant risk to the organization at this time."
  })[d.verdict] || (d.unresolved ? "This name has no DNS records and does not resolve — it appears unregistered or inactive, and cannot host a website or send/receive mail." : "Manual review required.");
  const decision = (hash ? {
    "Likely Malicious": "Authorize blocking the hash in EDR and purging any email carrying the file.",
    "Suspicious": "Approve sandbox analysis and containment before the file is used.",
    "Low–Moderate": "No immediate action; monitor and sandbox if warranted.",
    "Likely Legitimate": "No action required."
  } : cidr ? {
    "Likely Malicious": "Consider a range block at the firewall and investigate the worst offenders.",
    "Suspicious": "Approve monitoring of the range; review reported addresses before any block.",
    "Low–Moderate": "No immediate action; continue routine monitoring.",
    "Likely Legitimate": "No action required."
  } : ip ? {
    "Likely Malicious": "Authorize blocking at the firewall/EDR and hunt for existing connections to it.",
    "Suspicious": "Approve monitoring and a short investigation; consider a temporary block.",
    "Low–Moderate": "No immediate action; continue routine monitoring.",
    "Likely Legitimate": "No action required."
  } : {
    "Likely Malicious": "Authorize blocking at email/web gateways and notify potentially affected users.",
    "Suspicious": "Approve quarantine and a short investigation before any release.",
    "Low–Moderate": "No immediate action; continue routine monitoring.",
    "Likely Legitimate": "No action required."
  })[d.verdict] || (d.unresolved ? "No action required on the name itself; verify the spelling if it was expected to be live, and treat any mail claiming to be from it as forged." : "Defer to the security team.");

  const L = [];
  L.push("EXECUTIVE SECURITY BRIEF");
  L.push("");
