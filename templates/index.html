<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OSINT Scan</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
  <h1 class="brand">
    <img src="/static/favicon.svg" alt="" class="logo" width="26" height="26">
    OSINT <span>Scan</span>
  </h1>
  <p>Domain · URL · Email — spam / malware / BEC triage</p>
</header>

<div class="wrap">
  <form class="search" onsubmit="event.preventDefault(); analyze();">
    <input id="target" placeholder="domain, URL, or email — defanged is fine (hxxp://evil[.]com)" autocomplete="off" autofocus>
    <button id="analyzeBtn" type="submit">Analyze</button>
  </form>
  <p class="hint">
    Accepts <code>example.com</code>, <code>https://x.com/path</code>, <code>user@example.com</code>.
    Refangs <code>hxxp</code>, <code>[.]</code>, <code>[at]</code> automatically.
  </p>

  <div id="status" class="status"></div>
  <div id="output"></div>
</div>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s == null ? "" : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

async function analyze() {
  const target = $("target").value.trim();
  if (!target) return;
  const btn = $("analyzeBtn");
  btn.disabled = true;
  $("status").innerHTML = '<span class="dot"></span><span class="scanning">Triaging ' + esc(target) + '</span>';
  $("output").innerHTML = "";

  const form = new FormData();
  form.append("target", target);

  try {
    const res = await fetch("/analyze", { method: "POST", body: form });
    const data = await res.json();
    if (!data.ok) {
      $("output").innerHTML = '<div class="err">✗ ' + esc(data.error || "Analysis failed") + '</div>';
      $("status").innerHTML = "";
      return;
    }
    render(data);
    $("status").innerHTML = '✓ Triage complete · ' + esc(data.kind) + ' · ' + esc(data.domain);
  } catch (e) {
    $("output").innerHTML = '<div class="err">✗ Network error</div>';
    $("status").innerHTML = "";
  } finally {
    btn.disabled = false;
  }
}

function render(d) {
  $("output").innerHTML = verdictBanner(d) + cards(d);
}

function verdictClass(v) {
  return ({"Likely Legitimate":"low","Low–Moderate":"lowmod","Suspicious":"suspicious","Likely Malicious":"malicious"})[v] || "low";
}
function ringColor(v) {
  return ({"low":"#2ea043","lowmod":"#c69026","suspicious":"#c69026","malicious":"#ff4d4d"})[verdictClass(v)];
}

function verdictBanner(d) {
  const cls = verdictClass(d.verdict);
  const tags = (d.bec || []).map(t => '<span class="tag bec">BEC · ' + esc(t) + '</span>').join("");
  return '' +
    '<div class="verdict ' + cls + ' fade-in" style="--pct:' + d.score + ';--ring:' + ringColor(d.verdict) + '">' +
      '<div class="score-ring"><i>' + d.score + '</i></div>' +
      '<div class="v-main">' +
        '<div class="label">Verdict</div>' +
        '<div class="val">' + esc(d.verdict) + '</div>' +
        '<div class="ioc">' + esc(d.defanged) + '  ·  risk ' + d.score + '/100</div>' +
        (tags ? '<div class="tags">' + tags + '</div>' : '') +
      '</div>' +
    '</div>' +
    (d.reasons && d.reasons.length ?
      '<div class="card fade-in"><h3>Signals</h3><pre>' + d.reasons.map(r => "• " + esc(r)).join("\n") + '</pre></div>' : '');
}

function pill(label, on) {
  return '<span class="pill ' + (on ? 'on' : 'off') + '">' + esc(label) + (on ? ' ✓' : ' ✗') + '</span>';
}

function cards(d) {
  const out = [];

  // Email authentication posture — the BEC card
  const dmarc = d.dmarc_parsed, spf = d.spf_parsed;
  const dmarcBad = !dmarc || (dmarc.policy || "none").toLowerCase() === "none";
  out.push(card("Email Auth Posture (BEC)",
    kvrow("DMARC", dmarc ? "p=" + dmarc.policy + (dmarc.pct && dmarc.pct !== "100" ? " pct=" + dmarc.pct : "") : "MISSING", dmarcBad ? "bad" : "good") +
    kvrow("SPF", spf ? spf.policy : "MISSING", spf ? (spf.policy.includes("dangerous") ? "bad" : "good") : "bad") +
    kvrow("DKIM", (d.dkim && d.dkim.length) ? d.dkim.join(", ") : "none found (selectors probed)", (d.dkim && d.dkim.length) ? "good" : "warn") +
    kvrow("Mail provider", d.mx_provider || "—") +
    (dmarc && dmarc.rua ? kvrow("DMARC rua", dmarc.rua) : "")
  ));

  // Domain reputation / age
  const ev = d.rdap_events || {};
  out.push(card("Domain Intelligence",
    kvrow("Registrable", d.registrable + (d.subdomain ? "  (subdomain queried)" : "")) +
    kvrow("Registered", d.registered ? d.registered.slice(0,10) : (ev.registration || "?")) +
    kvrow("Age", d.age_days != null ? (d.age_days + " days" + (d.age_days < 90 ? " ⚠" : "")) : "?", d.age_days != null && d.age_days < 90 ? "warn" : "") +
    kvrow("Expires", (ev.expiration || "?").slice(0,10)) +
    kvrow("Registrar", d.registrar || "?") +
    kvrow("TLD risk", d.high_risk_tld ? "HIGH-ABUSE TLD" : "normal", d.high_risk_tld ? "bad" : "good") +
    (d.lookalike && d.lookalike.exact_brand ? kvrow("Brand match", "exact: " + d.lookalike.exact_brand, "good") : "") +
    ((d.lookalike && d.lookalike.flags && d.lookalike.flags.length) ?
      kvrow("Look-alike", d.lookalike.flags.map(f => f.detail).join(" · "), "bad") : "")
  ));

  // Infrastructure
  const i = d.info || {};
  out.push(card("Infrastructure",
    kvrow("Resolved IP", d.ip || "N/A") +
    kvrow("Country", i.country ? (i.country + " (" + (i.countryCode||"") + ")") : "?") +
    kvrow("Location", (i.regionName||"?") + " / " + (i.city||"?")) +
    kvrow("ISP / Org", i.isp || i.org || "?") +
    kvrow("ASN", i.as || "?") +
    kvrow("rDNS", i.reverse || "—") +
    kvrow("Hosting/Proxy", (i.hosting ? "hosting " : "") + (i.proxy ? "proxy/VPN" : ""), i.proxy ? "warn" : "")
  ));

  // VirusTotal
  out.push(card("VirusTotal", vtBlock(d.vt)));

  // AbuseIPDB
  out.push(card("AbuseIPDB (IP)", abuseBlock(d.abuse)));

  // DNS
  out.push(card("DNS Records",
    kvrow("A", (d.a||[]).join(", ") || "None") +
    kvrow("AAAA", (d.aaaa||[]).join(", ") || "None") +
    kvrow("MX", (d.mx||[]).join("  ") || "None") +
    kvrow("NS", (d.ns||[]).join("  ") || "None") +
    kvrow("TXT", (d.txt||[]).map(esc).join("\n") || "None")
  ));

  // urlscan + crtsh combined
  out.push(card("urlscan.io", urlscanBlock(d.urlscan)));
  out.push(card("Subdomains (crt.sh)", crtBlock(d.crtsh)));

  // ticket summary (full width)
  out.push(
    '<div class="card span2 fade-in"><h3>Ticket Summary' +
    '<button class="copybtn" onclick="copySummary()">Copy</button></h3>' +
    '<pre id="ticket">' + esc(d.ticket_summary) + '</pre></div>'
  );

  // external lookups (full width)
  out.push('<div class="card span2 fade-in links"><h3>External Pivots</h3>' + linksBlock(d) + '</div>');

  return '<div class="grid">' + out.join("") + '</div>';
}

function card(title, body) {
  return '<div class="card fade-in"><h3>' + esc(title) + '</h3><div class="kv-wrap">' + body + '</div></div>';
}
function kvrow(k, v, cls) {
  return '<div class="kv"><div class="k">' + esc(k) + '</div><div class="v ' + (cls||"") + '">' + esc(v) + '</div></div>';
}

function vtBlock(v) {
  if (!v) return '<pre class="muted">No VT data (set VT_API_KEY, or no record)</pre>';
  const s = v.last_analysis_stats || {};
  const rep = v.reputation;
  return kvrow("Malicious", s.malicious||0, (s.malicious>0?"bad":"good")) +
         kvrow("Suspicious", s.suspicious||0, (s.suspicious>0?"warn":"")) +
         kvrow("Harmless", s.harmless||0) +
         kvrow("Undetected", s.undetected||0) +
         (rep!=null ? kvrow("Reputation", rep, rep<0?"bad":"") : "") +
         (v.categories ? kvrow("Categories", Object.values(v.categories).slice(0,4).join(", ")) : "");
}
function abuseBlock(a) {
  if (!a) return '<pre class="muted">No AbuseIPDB data (set ABUSEIPDB_API_KEY)</pre>';
  const sc = a.abuseConfidenceScore || 0;
  return kvrow("Confidence", sc + "/100", sc>=50?"bad":(sc>=20?"warn":"good")) +
         kvrow("Total reports", a.totalReports||0) +
         kvrow("Last reported", a.lastReportedAt || "—") +
         kvrow("Country", a.countryCode || "?") +
         kvrow("Usage type", a.usageType || "?") +
         kvrow("Domain", a.domain || "—");
}
function urlscanBlock(u) {
  if (!u || !u.results || !u.results.length) return '<pre class="muted">No recent urlscan submissions</pre>';
  return '<div class="kv"><div class="k">Recent scans</div><div class="v">' + (u.count||u.results.length) + '</div></div>' +
    u.results.map(r => '<div style="margin-top:6px"><a href="' + esc(r.result) + '" target="_blank" rel="noopener">' +
      esc((r.url||"").slice(0,60)) + '</a><div class="muted" style="font-size:11px">' + esc((r.time||"").slice(0,10)) + '</div></div>').join("");
}
function crtBlock(c) {
  if (!c || !c.subdomains) return '<pre class="muted">No certificate data</pre>';
  return '<div class="kv"><div class="k">Total</div><div class="v">' + c.count + '</div></div>' +
    '<div class="subs" style="margin-top:8px">' + c.subdomains.map(s => '<div>' + esc(s) + '</div>').join("") + '</div>';
}
function linksBlock(d) {
  const dom = encodeURIComponent(d.domain);
  const ip = encodeURIComponent(d.ip || "");
  const links = [
    ["VirusTotal", "https://www.virustotal.com/gui/domain/" + dom],
    ["urlscan", "https://urlscan.io/domain/" + dom],
    ["MXToolbox", "https://mxtoolbox.com/SuperTool.aspx?action=mx%3a" + dom],
    ["Talos", "https://talosintelligence.com/reputation_center/lookup?search=" + dom],
    ["AbuseIPDB", "https://www.abuseipdb.com/check/" + ip],
    ["Censys", "https://search.censys.io/search?q=" + dom],
    ["Shodan", "https://www.shodan.io/search?query=" + dom],
    ["crt.sh", "https://crt.sh/?q=" + dom],
    ["Google Safe Browsing", "https://transparencyreport.google.com/safe-browsing/search?url=" + dom],
    ["WHOIS", "https://who.is/whois/" + dom],
  ];
  if (d.email) links.unshift(["EmailRep", "https://emailrep.io/" + encodeURIComponent(d.email)]);
  return links.map(l => '<a href="' + esc(l[1]) + '" target="_blank" rel="noopener">' + esc(l[0]) + '</a>').join("");
}

function copySummary() {
  const t = $("ticket");
  if (t) navigator.clipboard.writeText(t.textContent).then(() => {
    const b = document.querySelector('.copybtn');
    if (b) { const o = b.textContent; b.textContent = "Copied ✓"; setTimeout(() => b.textContent = o, 1400); }
  });
}
</script>

</body>
</html>
