<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OSINT Domain Analyzer</title>
<style>
:root {
  --bg: #0a0d12;
  --panel: #0f141b;
  --panel-2: #131923;
  --line: #1d2532;
  --text: #d7dde6;
  --muted: #7a8493;
  --accent: #4ea1ff;
  --accent-2: #2f6feb;
  --good: #2ea043;
  --warn: #c69026;
  --bad: #d94c4c;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  background: radial-gradient(circle at top, #0d1117 0%, #06090d 100%);
  color: var(--text);
  font-family: ui-monospace, "JetBrains Mono", "Consolas", monospace;
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
header {
  border-bottom: 1px solid var(--line);
  padding: 18px 24px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
}
header h1 {
  margin: 0;
  font-size: 18px;
  letter-spacing: 0.5px;
  font-weight: 600;
}
header h1 span { color: var(--accent); }
header p { margin: 0; font-size: 12px; color: var(--muted); }
.search {
  display: flex;
  border: 1px solid var(--line);
  border-radius: 4px;
  background: var(--panel);
  margin: 24px auto;
  max-width: 720px;
  overflow: hidden;
  transition: border-color .2s ease, box-shadow .2s ease;
}
.search:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(78,161,255,0.15);
}
.search input {
  flex: 1;
  padding: 12px 14px;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
}
.search button {
  background: var(--accent-2);
  color: #fff;
  border: none;
  padding: 0 22px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: background .15s ease;
}
.search button:hover { background: var(--accent); }
.search button:disabled { background: #2a3340; cursor: not-allowed; }
.status {
  text-align: center;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 12px;
  min-height: 16px;
}
.status .dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  margin-right: 6px;
  animation: pulse 1.2s infinite;
  vertical-align: middle;
}
@keyframes pulse {
  0%   { opacity: .3; transform: scale(.9); }
  50%  { opacity: 1; transform: scale(1); }
  100% { opacity: .3; transform: scale(.9); }
}
.risk {
  max-width: 1200px;
  margin: 0 auto 24px;
  padding: 10px 14px;
  font-size: 13px;
  border-left: 4px solid var(--good);
  background: var(--panel);
  color: var(--text);
}
.risk.low    { border-color: var(--good); }
.risk.medium { border-color: var(--warn); }
.risk.high   { border-color: var(--bad); }
.hidden { display: none; }
.grid {
  display: grid;
  gap: 14px;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 20px 40px;
}
.card {
  background: var(--panel);
  border: 1px solid var(--line);
  padding: 14px 16px;
  transition: border-color .15s ease, transform .15s ease;
}
.card:hover { border-color: #2a3445; }
.card h3 {
  font-size: 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  margin: 0 0 8px;
  border-bottom: 1px solid var(--line);
  padding-bottom: 6px;
  font-weight: 500;
}
pre {
  margin: 0;
  font-family: inherit;
  font-size: 13px;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
}
a {
  color: var(--accent);
  text-decoration: none;
  position: relative;
  transition: color .15s ease;
}
a:hover { color: #82c2ff; }
a:hover::after {
  content: "";
  position: absolute;
  left: 0; bottom: -2px;
  height: 1px; width: 100%;
  background: currentColor;
  opacity: .5;
}
.fade-in { animation: fadeIn .25s ease forwards; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.scanning::after {
  content: "_";
  animation: blink 1s steps(2,start) infinite;
  margin-left: 2px;
}
@keyframes blink { to { visibility: hidden; } }
</style>
</head>
<body>

<header>
  <h1>OSINT <span>// Domain Analyzer</span></h1>
  <p>Threat Intel · Infrastructure · Reputation</p>
</header>

<form class="search" onsubmit="event.preventDefault(); analyze();">
  <input id="domain" placeholder="Enter a domain (e.g. example.com)" autocomplete="off">
  <button id="analyzeBtn" type="submit">Analyze</button>
</form>

<div id="status" class="status"></div>
<div id="risk" class="risk hidden">Awaiting analysis…</div>
<section id="result" class="grid"></section>

<script>
const $ = id => document.getElementById(id);

async function analyze() {
  const domain = $("domain").value.trim();
  if (!domain) return;
  const btn = $("analyzeBtn");
  btn.disabled = true;
  $("status").innerHTML = '<span class="dot"></span><span class="scanning">Scanning ' + domain + '</span>';
  $("result").innerHTML = "";
  $("risk").classList.add("hidden");

  const form = new FormData();
  form.append("domain", domain);

  try {
    const res = await fetch("/analyze", { method: "POST", body: form });
    const data = await res.json();
    renderRisk(data);
    renderCards(data);
    $("status").innerHTML = '✓ Completed scan for <b>' + domain + '</b>';
  } catch (e) {
    $("status").innerHTML = '✗ Error analyzing ' + domain;
  } finally {
    btn.disabled = false;
  }
}

function renderRisk(data) {
  const r = $("risk");
  r.className = "risk fade-in " + data.risk;
  r.innerHTML = "Risk: <b>" + data.risk.toUpperCase() + "</b>" +
    (data.reasons.length ? "  ·  " + data.reasons.join(" · ") : "");
}

function renderCards(data) {
  const out = $("result");
  out.innerHTML = "";
  const cards = [
    { title: "Infrastructure", body:
      "IP:        " + (data.ip || "N/A") + "\n" +
      "Country:   " + ((data.info && data.info.country) || "?") + "\n" +
      "City:      " + ((data.info && data.info.regionName) || "?") + " / " + ((data.info && data.info.city) || "?") + "\n" +
      "ISP:       " + ((data.info && data.info.isp) || "?") + "\n" +
      "Org:       " + ((data.info && data.info.org) || "?") + "\n" +
      "ASN:       " + ((data.info && data.info.as) || "?")
    },
    { title: "DNS", body:
      "A:     " + ((data.a||[]).join(", ") || "None") + "\n" +
      "MX:    " + ((data.mx||[]).join(", ") || "None") + "\n" +
      "NS:    " + ((data.ns||[]).join(", ") || "None") + "\n" +
      "TXT:   " + ((data.txt||[]).join(" | ") || "None") + "\n" +
      "DMARC: " + ((data.dmarc||[]).join(" | ") || "None")
    },
    { title: "VirusTotal", body: vtBlock(data.vt) },
    { title: "AbuseIPDB", body: abuseBlock(data.abuse) },
    { title: "WHOIS / RDAP", body: rdapBlock(data.rdap) },
    { title: "External Lookups", body: linksBlock(data) }
  ];

  cards.forEach(c => {
    const div = document.createElement("div");
    div.className = "card fade-in";
    div.innerHTML = "<h3>" + c.title + "</h3><pre>" + c.body + "</pre>";
    out.appendChild(div);
  });
}

function vtBlock(v) {
  if (!v) return "No VT data";
  const s = v.last_analysis_stats || {};
  return "Malicious:  " + (s.malicious||0) + "\n" +
         "Suspicious: " + (s.suspicious||0) + "\n" +
         "Harmless:   " + (s.harmless||0) + "\n" +
         "Undetected: " + (s.undetected||0);
}
function abuseBlock(a) {
  if (!a) return "No AbuseIPDB data";
  return "Score:    " + a.abuseConfidenceScore + "/100\n" +
         "Reports:  " + a.totalReports + "\n" +
         "Country:  " + a.countryCode + "\n" +
         "Usage:    " + a.usageType;
}
function rdapBlock(r) {
  if (!r || !r.events) return "No RDAP data";
  const e = {};
  r.events.forEach(x => e[x.eventAction] = x.eventDate);
  return "Registered:   " + (e.registration || "?") + "\n" +
         "Last Changed: " + (e["last changed"] || "?") + "\n" +
         "Expires:      " + (e.expiration || "?");
}
function linksBlock(d) {
  const links = [
    ["VirusTotal", "https://www.virustotal.com/gui/domain/" + d.domain],
    ["MXToolbox",  "https://mxtoolbox.com/SuperTool.aspx?action=mx%3a" + d.domain],
    ["URLScan",    "https://urlscan.io/domain/" + d.domain],
    ["AbuseIPDB",  "https://www.abuseipdb.com/check/" + (d.ip || "")],
    ["Talos",      "https://talosintelligence.com/reputation_center/lookup?search=" + d.domain],
    ["Censys",     "https://search.censys.io/search?q=" + d.domain],
    ["Shodan",     "https://www.shodan.io/search?query=" + d.domain]
  ];
  return links.map(function(item){
    return '<a href="' + item[1] + '" target="_blank" rel="noopener">' + item[0] + '</a>';
  }).join("\n");
}
</script>

</body>
</html>
