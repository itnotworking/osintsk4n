services:
  - type: web
    name: osintsk4n
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: VT_API_KEY
        sync: false
      - key: ABUSEIPDB_API_KEY
        sync: false
      - key: URLSCAN_API_KEY
        sync: false
      - key: OTX_API_KEY
        sync: false
      - key: ABUSECH_API_KEY
        sync: false
      - key: GSB_API_KEY
        sync: false
      - key: EMAILREP_API_KEY
        sync: false
